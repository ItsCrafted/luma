<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proxy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111; --border: #222; --border-hi: #333;
    --text: #e8e8e8; --muted: #666; --accent: #7DF9AA; --danger: #f87171;
    --warn: #fbbf24; --radius: 6px;
    --mono: 'IBM Plex Mono', monospace; --sans: 'Space Grotesk', sans-serif;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); font-size: 14px; }
  .shell { display: grid; grid-template-rows: auto 1fr; height: 100%; }
  header { border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: stretch; background: var(--surface); }
  .brand { display: flex; align-items: center; gap: 10px; padding: 12px 16px 12px 0; border-right: 1px solid var(--border); margin-right: 12px; flex-shrink: 0; }
  .brand-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .brand-name { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent); letter-spacing: .08em; }
  .bar { flex: 1; display: flex; align-items: center; gap: 8px; padding: 8px 0; }
  .url-wrap { flex: 1; }
  .url-wrap input { width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 7px 10px; outline: none; transition: border-color .15s; }
  .url-wrap input:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  .go-btn { background: var(--accent); color: #000; border: none; border-radius: var(--radius); font-family: var(--mono); font-size: 12px; font-weight: 500; padding: 7px 16px; cursor: pointer; flex-shrink: 0; transition: opacity .15s; }
  .go-btn:hover { opacity: .85; }
  .go-btn:disabled { opacity: .4; cursor: not-allowed; }
  .status-pill { display: flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--muted); flex-shrink: 0; white-space: nowrap; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--muted); transition: background .3s; }
  .status-dot.ok { background: var(--accent); }
  .status-dot.err { background: var(--danger); }
  .status-dot.spin { background: var(--warn); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
  .content { position: relative; overflow: hidden; }
  .landing { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px; padding: 40px; }
  .landing-text { text-align: center; }
  .landing-text h2 { font-size: 18px; font-weight: 400; font-family: var(--mono); margin-bottom: 8px; }
  .landing-text p { color: var(--muted); font-size: 13px; max-width: 400px; line-height: 1.7; }
  .steps { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 400px; }
  .step { display: flex; gap: 12px; padding: 12px 14px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); }
  .step-num { font-family: var(--mono); font-size: 11px; color: var(--accent); flex-shrink: 0; margin-top: 1px; }
  .step-text { font-size: 12px; color: var(--muted); line-height: 1.6; }
  .step-text code { color: var(--text); font-family: var(--mono); font-size: 11px; background: var(--bg); padding: 1px 4px; border-radius: 3px; }
  #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(80px); background: var(--surface); border: 1px solid var(--border-hi); color: var(--text); font-family: var(--mono); font-size: 12px; padding: 10px 18px; border-radius: 20px; transition: transform .25s; z-index: 9999; white-space: nowrap; }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.err { border-color: var(--danger); color: var(--danger); }
  #toast.ok  { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-name">PROXY</span>
    </div>
    <div class="bar">
      <div class="url-wrap">
        <input type="text" id="url-input" placeholder="https://example.com" />
      </div>
      <button class="go-btn" id="go-btn" disabled>GO</button>
      <div class="status-pill">
        <div class="status-dot spin" id="status-dot"></div>
        <span id="status-text">init</span>
      </div>
    </div>
  </header>
  <div class="content">
    <div class="landing">
      <div class="landing-text">
        <h2>web proxy</h2>
        <p>Enter any URL and hit GO.</p>
      </div>
      <div class="steps">
        <div class="step"><span class="step-num">01</span><span class="step-text">Wait for the dot to turn green</span></div>
        <div class="step"><span class="step-num">02</span><span class="step-text">Enter any URL — <code>http://</code> or <code>https://</code></span></div>
        <div class="step"><span class="step-num">03</span><span class="step-text">Hit <code>GO</code></span></div>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script src="/hyperspeed.mux.js"></script>
<script>
const urlInput  = document.getElementById('url-input');
const goBtn     = document.getElementById('go-btn');
const dot       = document.getElementById('status-dot');
const statusTxt = document.getElementById('status-text');
const toastEl   = document.getElementById('toast');

let swReady = false;

function setStatus(s, l) { dot.className = 'status-dot ' + (s||''); statusTxt.textContent = l; }
function showToast(msg, type, dur=3500) {
  toastEl.textContent = msg; toastEl.className = 'show' + (type?' '+type:'');
  clearTimeout(toastEl._t); toastEl._t = setTimeout(() => { toastEl.className=''; }, dur);
}
function updateGoBtn() {
  goBtn.disabled = !(swReady && urlInput.value.trim().length > 4);
}

urlInput.addEventListener('input', updateGoBtn);
urlInput.addEventListener('keydown', e => { if (e.key==='Enter' && !goBtn.disabled) go(); });
goBtn.addEventListener('click', go);

function go() {
  let url = urlInput.value.trim();
  if (!url) return;
  if (!/^https?:\/\//i.test(url)) url = 'https://' + url;

  // UV encodes URL as btoa and puts it under /proxy/
  const encoded = __hyperspeed$config.encodeUrl(url);
  location.href = __hyperspeed$config.prefix + encoded;
}

async function registerSW() {
  if (!('serviceWorker' in navigator)) { setStatus('err','unsupported'); return; }
  setStatus('spin','registering…');

  let reg;
  try {
    reg = await navigator.serviceWorker.register('/sw.js', { scope: '/', updateViaCache: 'none' });
  } catch(e) {
    setStatus('err','reg failed');
    showToast('SW failed: ' + e.message, 'err', 8000);
    return;
  }

  if (reg.waiting) reg.waiting.postMessage({ type: 'skip' });
  await navigator.serviceWorker.ready;

  if (!navigator.serviceWorker.controller) {
    navigator.serviceWorker.addEventListener('controllerchange', () => location.reload(), { once: true });
    return;
  }

  // Init bare-mux transport in the page context too (for the SW SharedWorker)
  try {
    const mux = new BareMux.BareClient();
    await mux.setTransport('/transport.js', []);
  } catch(e) {
    console.warn('[proxy] bare-mux transport init:', e);
  }

  // Confirm SW intercept
  for (let i = 0; i < 25; i++) {
    try {
      const r = await fetch('/sw-check', { cache: 'no-store' });
      if (r.ok && (await r.json()).ok) {
        swReady = true;
        setStatus('ok', 'sw ready');
        updateGoBtn();
        return;
      }
    } catch {}
    await new Promise(r => setTimeout(r, 200));
  }
  setStatus('err', 'not intercepting');
  showToast('SW not intercepting — try Ctrl+Shift+R', 'err', 8000);
}

registerSW();
</script>
<script src="/hyperspeed.config.js"></script>
</body>
</html>
