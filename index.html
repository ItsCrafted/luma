<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hyperspeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;--surface:#13131a;--surface2:#1a1a24;--surface3:#20202d;--surface4:#28283a;
  --border:rgba(255,255,255,0.07);--border-hi:rgba(255,255,255,0.13);
  --text:#e8e8f0;--muted:#5a5a70;--muted2:#2a2a38;
  --pink:#d856bf;--pink-dim:rgba(216,86,191,0.15);--pink-glow:rgba(216,86,191,0.4);
  --cyan:#03b3c3;--cyan-dim:rgba(3,179,195,0.15);--cyan-glow:rgba(3,179,195,0.4);
  --mono:'IBM Plex Mono',monospace;--sans:'Plus Jakarta Sans',sans-serif;
  --radius-sm:10px;--radius-md:14px;--radius-lg:20px;--radius-xl:28px;
  --sidebar-w:58px;--tabs-h:52px;--chrome-h:52px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.06;animation:blobdrift 18s ease-in-out infinite}
.blob.p{width:400px;height:400px;background:var(--pink);top:-100px;left:calc(var(--sidebar-w) - 80px)}
.blob.c{width:500px;height:500px;background:var(--cyan);bottom:-150px;right:-100px;animation-delay:6s}
.blob.p2{width:300px;height:300px;background:var(--pink);bottom:20%;left:30%;animation-delay:3s;opacity:0.04}
@keyframes blobdrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(30px,-20px) scale(1.05)}66%{transform:translate(-20px,30px) scale(0.97)}}

/* ─── Layout ─── */
.browser{
  display:grid;
  grid-template-rows:var(--tabs-h) var(--chrome-h) 0px 1fr;
  grid-template-columns:var(--sidebar-w) 1fr;
  height:100vh;position:relative;z-index:1;
  transition:grid-template-rows 0.2s ease;
}
.browser.bm-open{grid-template-rows:var(--tabs-h) var(--chrome-h) 30px 1fr}

/* ─── Sidebar ─── */
.sidebar{
  grid-row:1/5;grid-column:1;
  background:rgba(19,19,26,0.85);backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0 12px;gap:4px;z-index:200;
}
.sidebar-logo{width:38px;height:38px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:10px;flex-shrink:0}
.logo-img{width:28px;height:28px;object-fit:contain;filter:drop-shadow(0 0 6px var(--pink-glow));transition:filter 0.3s}
.sidebar-logo:hover .logo-img{filter:drop-shadow(0 0 10px var(--cyan-glow))}
.nav-btn{
  width:38px;height:38px;border:1px solid transparent;background:none;border-radius:var(--radius-md);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);transition:all 0.2s;position:relative;flex-shrink:0;font-size:14px;
}
.nav-btn:hover{background:var(--surface3);border-color:var(--border-hi);color:#888;transform:scale(1.05)}
.nav-btn.active{color:var(--pink);border-color:rgba(216,86,191,0.3);background:rgba(216,86,191,0.1);box-shadow:0 0 16px rgba(216,86,191,0.15)}
.nav-tooltip{
  position:absolute;left:calc(100% + 12px);top:50%;transform:translateY(-50%);
  background:var(--surface3);border:1px solid var(--border-hi);
  color:var(--text);font-family:var(--mono);font-size:10px;
  letter-spacing:1px;padding:6px 12px;white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity 0.15s;z-index:9999;border-radius:var(--radius-sm);
}
.nav-btn:hover .nav-tooltip{opacity:1}
.sidebar-spacer{flex:1}
.sidebar-divider{width:28px;height:1px;background:var(--border);flex-shrink:0;margin:4px 0}

/* Account avatar button */
.acct-btn{
  width:30px;height:30px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--cyan));
  border:2px solid transparent;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:11px;font-weight:500;color:#fff;
  transition:all 0.2s;flex-shrink:0;position:relative;
  box-shadow:0 0 10px var(--pink-glow);
}
.acct-btn:hover{transform:scale(1.1);box-shadow:0 0 16px var(--cyan-glow)}
.acct-btn.guest{background:var(--surface3);border-color:var(--border-hi);color:var(--muted);box-shadow:none}
.acct-btn .nav-tooltip{font-size:9px}

/* ─── Tab Bar ─── */
.tab-bar{
  grid-row:1;grid-column:2;
  background:rgba(19,19,26,0.7);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:8px 10px 0;gap:4px;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;height:var(--tabs-h);
}
.tab-bar::-webkit-scrollbar{display:none}
.tab{
  display:flex;align-items:center;gap:6px;padding:0 10px 0 12px;
  min-width:0;width:160px;height:36px;flex-shrink:0;
  background:var(--surface3);border:1px solid var(--border);
  border-radius:var(--radius-md) var(--radius-md) 0 0;
  cursor:pointer;position:relative;font-family:var(--mono);font-size:10px;
  color:var(--muted);letter-spacing:0.3px;transition:all 0.2s;user-select:none;overflow:hidden;
}
.tab::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.03),transparent 60%);pointer-events:none}
.tab:hover{background:var(--surface4);border-color:var(--border-hi);color:#888}
.tab.active{background:var(--bg);border-color:rgba(216,86,191,0.25);border-bottom-color:var(--bg);color:var(--text);box-shadow:0 -2px 12px rgba(216,86,191,0.08)}
.tab.active::after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--pink),var(--cyan));border-radius:var(--radius-md) var(--radius-md) 0 0}
.tab.dragging{opacity:0.5;transform:scale(0.95)}
.tab.drag-over{border-color:var(--cyan);background:var(--cyan-dim)}
.tab-bar.compact .tab{width:100px}
.tab-bar.very-compact .tab{width:60px;padding:0 6px}
.tab-favicon{font-size:11px;flex-shrink:0;opacity:0.7;transition:color 0.2s}
.tab.active .tab-favicon{opacity:1;color:var(--pink)}
.tab-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-spinner{width:10px;height:10px;border:1px solid var(--muted2);border-top-color:var(--cyan);border-radius:50%;animation:tabspin 0.8s linear infinite;flex-shrink:0;display:none}
.tab.loading .tab-spinner{display:block}.tab.loading .tab-favicon{display:none}
@keyframes tabspin{to{transform:rotate(360deg)}}
.tab-close{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted2);flex-shrink:0;transition:all 0.15s;opacity:0;background:transparent}
.tab:hover .tab-close{opacity:1;color:var(--muted)}
.tab-close:hover{background:rgba(255,255,255,0.1);color:var(--text)!important}
.tab-mute{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--muted);flex-shrink:0;opacity:0;transition:all 0.15s;cursor:pointer}
.tab:hover .tab-mute{opacity:0.6}.tab.muted .tab-mute{opacity:1;color:var(--pink)}
.tab-new-btn{
  width:30px;height:30px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);font-size:12px;
  background:var(--surface3);border:1px solid var(--border);border-radius:var(--radius-sm);
  transition:all 0.2s;margin-bottom:2px;
}
.tab-new-btn:hover{color:var(--cyan);background:var(--cyan-dim);border-color:rgba(3,179,195,0.3);transform:scale(1.08)}

/* ─── Chrome ─── */
.chrome{
  grid-row:2;grid-column:2;
  background:rgba(26,26,36,0.8);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:6px;padding:0 12px;height:var(--chrome-h);
}
.chrome-btn{
  width:28px;height:28px;border:1px solid transparent;background:none;border-radius:var(--radius-sm);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--muted);font-size:12px;transition:all 0.2s;flex-shrink:0;
}
.chrome-btn:hover{background:var(--surface3);border-color:var(--border);color:#888;transform:scale(1.05)}
.chrome-btn:disabled{opacity:0.2;cursor:default;pointer-events:none}
.chrome-btn.active{color:var(--pink);border-color:rgba(216,86,191,0.3);background:var(--pink-dim)}
.url-bar-wrap{flex:1;position:relative;display:flex;align-items:center}
.url-bar{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);
  color:var(--text);font-family:var(--mono);font-size:11px;
  padding:7px 36px 7px 16px;outline:none;height:32px;transition:all 0.25s;
}
.url-bar:focus{border-color:rgba(216,86,191,0.5);box-shadow:0 0 0 4px rgba(216,86,191,0.07);background:var(--surface2)}
.url-bar::placeholder{color:var(--muted)}
.url-lock{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:11px;pointer-events:none}
.url-lock.secure{color:var(--cyan)}
.bookmark-btn{width:28px;height:28px;border:1px solid transparent;background:none;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--muted);font-size:13px;transition:all 0.2s;flex-shrink:0}
.bookmark-btn:hover{color:#f0c040}.bookmark-btn.bookmarked{color:#f0c040}
.pills{display:flex;gap:5px;align-items:center}
.pill{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;flex-shrink:0;padding:4px 10px;border:1px solid var(--border);border-radius:20px;background:var(--surface)}
.pill-dot{width:5px;height:5px;border-radius:50%;background:var(--muted2);transition:all 0.3s;flex-shrink:0}
.pill-dot.ok{background:var(--cyan);box-shadow:0 0 6px var(--cyan-glow)}
.pill-dot.err{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,0.5)}
.pill-dot.spin{background:var(--pink);animation:pulsedot 0.9s ease-in-out infinite}
@keyframes pulsedot{0%,100%{opacity:1}50%{opacity:0.15}}
.load-pill{min-width:58px;justify-content:center;transition:all 0.3s}
.load-pill.loading{color:var(--pink);border-color:rgba(216,86,191,0.3)}
.load-pill.done{color:var(--cyan);border-color:rgba(3,179,195,0.3)}

/* ─── Bookmarks bar ─── */
.bm-bar{
  grid-row:3;grid-column:2;
  overflow:hidden;
  display:flex;align-items:center;
  padding:0 12px;gap:6px;
  background:rgba(19,19,26,0.6);
  border-bottom:1px solid var(--border);
  overflow-x:auto;scrollbar-width:none;
  height:0;transition:height 0.2s ease;
}
.bm-bar.visible{height:30px}
.bm-bar::-webkit-scrollbar{display:none}
.bm-item{
  display:flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;
  font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:0.5px;cursor:pointer;
  background:var(--surface3);border:1px solid var(--border);
  transition:all 0.15s;white-space:nowrap;flex-shrink:0;
}
.bm-item:hover{color:var(--text);border-color:var(--border-hi);background:var(--surface4)}
.bm-item i{font-size:9px}

/* ─── Viewport ─── */
.viewport{grid-row:4;grid-column:2;position:relative;overflow:hidden;background:var(--bg)}
.tab-pane{position:absolute;inset:0;display:none;overflow:hidden}
.tab-pane.active{display:block}
.tab-pane iframe{width:100%;height:100%;border:none;background:transparent}
.internal-view{width:100%;height:100%;overflow-y:auto;display:flex;flex-direction:column}

/* ─── Context Menu ─── */
.ctx-menu{position:fixed;z-index:9999;background:var(--surface2);border:1px solid var(--border-hi);border-radius:var(--radius-md);padding:6px;min-width:170px;box-shadow:0 16px 48px rgba(0,0,0,0.5);display:none;animation:ctxIn 0.15s ease}
.ctx-menu.open{display:block}
@keyframes ctxIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
.ctx-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius-sm);font-family:var(--mono);font-size:10px;color:var(--text);letter-spacing:0.5px;cursor:pointer;transition:all 0.15s;white-space:nowrap}
.ctx-item:hover{background:var(--surface3);color:var(--cyan)}
.ctx-item.danger:hover{background:rgba(239,68,68,0.08);color:#ef4444}
.ctx-item i{width:14px;text-align:center;color:var(--muted)}
.ctx-divider{height:1px;background:var(--border);margin:4px 0}

/* ─── Toast ─── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--surface2);border:1px solid var(--border-hi);border-radius:var(--radius-md);padding:10px 16px;font-family:var(--mono);font-size:10px;color:var(--text);letter-spacing:0.5px;display:flex;align-items:center;gap:8px;animation:toastIn 0.3s ease both;box-shadow:0 8px 24px rgba(0,0,0,0.4)}
.toast.out{animation:toastOut 0.3s ease forwards}
.toast i{color:var(--cyan)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px) scale(0.95)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(10px) scale(0.95)}}

/* ─── Find bar ─── */
.find-bar{
  position:absolute;top:8px;right:8px;z-index:500;
  background:var(--surface2);border:1px solid var(--border-hi);
  border-radius:var(--radius-md);padding:8px 12px;
  display:none;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,0.4);
}
.find-bar.open{display:flex}
.find-input{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--mono);font-size:10px;padding:5px 10px;outline:none;width:160px;transition:border-color 0.2s}
.find-input:focus{border-color:rgba(216,86,191,0.5)}
.find-count{font-family:var(--mono);font-size:9px;color:var(--muted);white-space:nowrap;min-width:36px;text-align:center}
.find-highlight{background:rgba(216,86,191,0.35);border-radius:2px}
.find-highlight.current{background:rgba(216,86,191,0.7);outline:1px solid var(--pink)}

/* ─── New Tab ─── */
.newtab{position:relative;z-index:1;flex:1;min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:28px}
.nt-logo{display:flex;flex-direction:column;align-items:center;gap:12px;animation:floatUp 0.5s ease both}
.nt-emblem{width:80px;height:80px;display:flex;align-items:center;justify-content:center;position:relative}
.nt-emblem::before{content:'';position:absolute;inset:-10px;border-radius:50%;border:1px solid rgba(216,86,191,0.18);animation:emblemring 4s ease-in-out infinite}
.nt-emblem::after{content:'';position:absolute;inset:-20px;border-radius:50%;border:1px solid rgba(3,179,195,0.1);animation:emblemring 4s ease-in-out infinite;animation-delay:1.2s}
@keyframes emblemring{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:0.4}}
.nt-emblem-img{width:80px;height:80px;object-fit:contain;filter:drop-shadow(0 0 18px var(--pink-glow));animation:emblempulse 3s ease-in-out infinite}
@keyframes emblempulse{0%,100%{filter:drop-shadow(0 0 18px var(--pink-glow))}50%{filter:drop-shadow(0 0 22px var(--cyan-glow))}}
.nt-wordmark{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:500;letter-spacing:4px}
.nt-wordmark .h{color:var(--pink)}.nt-wordmark .s{color:var(--cyan)}
.nt-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:4px;text-transform:uppercase}
.nt-clock{font-family:var(--mono);font-size:13px;color:var(--muted);letter-spacing:3px;animation:floatUp 0.5s 0.07s ease both}
.nt-search-wrap{width:100%;max-width:500px;animation:floatUp 0.5s 0.14s ease both;position:relative}
.nt-search{width:100%;background:var(--surface);border:1px solid var(--border-hi);border-radius:var(--radius-xl);color:var(--text);font-family:var(--mono);font-size:12px;padding:13px 46px 13px 20px;outline:none;transition:all 0.25s}
.nt-search:focus{border-color:rgba(216,86,191,0.5);box-shadow:0 0 0 5px rgba(216,86,191,0.06)}
.nt-search::placeholder{color:var(--muted)}
.nt-search-icon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none;font-size:13px}
.nt-suggestions{position:absolute;top:calc(100% + 6px);left:0;right:0;z-index:100;background:var(--surface2);border:1px solid var(--border-hi);border-radius:var(--radius-md);overflow:hidden;display:none}
.nt-suggestions.open{display:block}
.nt-sug-item{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--text);transition:background 0.12s;border-bottom:1px solid var(--border)}
.nt-sug-item:last-child{border-bottom:none}.nt-sug-item:hover{background:var(--surface3)}
.nt-sug-item i{color:var(--muted);width:14px;text-align:center}
.nt-tiles{display:grid;grid-template-columns:repeat(4,120px);gap:8px;animation:floatUp 0.5s 0.21s ease both}
.nt-tile{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 14px;cursor:pointer;transition:all 0.25s;display:flex;flex-direction:column;gap:9px;position:relative;overflow:hidden}
.nt-tile:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,0.4);border-color:var(--border-hi)}
.nt-tile.pk:hover{border-color:rgba(216,86,191,0.3);box-shadow:0 12px 32px rgba(0,0,0,0.4),0 0 24px rgba(216,86,191,0.07)}
.nt-tile.cy:hover{border-color:rgba(3,179,195,0.3);box-shadow:0 12px 32px rgba(0,0,0,0.4),0 0 24px rgba(3,179,195,0.07)}
.tile-icon{font-size:20px;color:var(--muted);transition:all 0.25s}
.nt-tile.pk:hover .tile-icon{color:var(--pink)}.nt-tile.cy:hover .tile-icon{color:var(--cyan)}
.tile-name{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.tile-desc{font-size:11px;color:var(--muted2);line-height:1.4}
.nt-divider{width:500px;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent);animation:floatUp 0.5s 0.28s ease both}
.nt-sites{display:flex;gap:10px;animation:floatUp 0.5s 0.28s ease both;max-width:500px;flex-wrap:wrap;justify-content:center}
.nt-site{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform 0.2s}
.nt-site:hover{transform:translateY(-3px)}
.nt-site-icon{width:44px;height:44px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--muted);transition:all 0.2s}
.nt-site:hover .nt-site-icon{border-color:var(--border-hi);color:var(--text);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.nt-site-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}
@keyframes floatUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}

/* ─── Stub pages ─── */
.stub-page{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:100%;gap:14px;color:var(--muted);font-family:var(--mono)}
.stub-icon{font-size:32px;opacity:0.4}.stub-label{font-size:10px;letter-spacing:4px;text-transform:uppercase}.stub-desc{font-size:10px;color:var(--muted2)}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}

/* ─── Auth / Account modal ─── */
.modal-backdrop{
  position:fixed;inset:0;z-index:5000;
  background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);
  display:none;align-items:center;justify-content:center;
}
.modal-backdrop.open{display:flex}
.modal{
  background:var(--surface);border:1px solid var(--border-hi);
  border-radius:var(--radius-lg);padding:32px;width:380px;
  animation:ctxIn 0.2s ease;position:relative;
}
.modal h2{font-family:var(--mono);font-size:14px;font-weight:500;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.modal h2 .h{color:var(--pink)}.modal h2 .s{color:var(--cyan)}
.modal-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;margin-bottom:24px}
.modal-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;transition:color 0.2s}
.modal-close:hover{color:var(--text)}
.modal-tabs{display:flex;gap:4px;margin-bottom:20px}
.modal-tab{flex:1;padding:8px;border:1px solid var(--border);border-radius:var(--radius-sm);background:none;cursor:pointer;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:1px;transition:all 0.15s}
.modal-tab:hover{background:var(--surface2);color:var(--text)}
.modal-tab.active{background:var(--pink-dim);border-color:rgba(216,86,191,0.4);color:var(--pink)}
.modal-field{margin-bottom:14px}
.modal-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block}
.modal-input{
  width:100%;background:var(--surface2);border:1px solid var(--border-hi);border-radius:var(--radius-sm);
  color:var(--text);font-family:var(--mono);font-size:11px;
  padding:10px 14px;outline:none;transition:all 0.2s;
}
.modal-input:focus{border-color:rgba(216,86,191,0.5);box-shadow:0 0 0 3px rgba(216,86,191,0.07)}
.modal-input::placeholder{color:var(--muted)}
.modal-btn{
  width:100%;padding:11px;border:none;border-radius:var(--radius-md);
  background:linear-gradient(135deg,var(--pink),var(--cyan));
  color:#fff;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:2px;
  cursor:pointer;transition:opacity 0.2s;margin-top:6px;
}
.modal-btn:hover{opacity:0.88}
.modal-btn:disabled{opacity:0.4;cursor:default}
.modal-err{font-family:var(--mono);font-size:10px;color:#ef4444;letter-spacing:0.5px;margin-top:10px;min-height:16px}
.modal-divider{height:1px;background:var(--border);margin:20px 0}

/* Account panel (when logged in) */
.acct-panel-tab{display:none}.acct-panel-tab.active{display:block}
.acct-avatar-row{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.acct-avatar-big{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:18px;font-weight:500;color:#fff;flex-shrink:0;
}
.acct-name{font-size:15px;font-weight:500}
.acct-email{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:2px}
.sync-row{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:10px;color:var(--muted)}
.sync-row:last-child{border-bottom:none}
.sync-row span{color:var(--text);font-size:11px}
.sync-status{font-size:9px;color:var(--cyan);letter-spacing:1px}
.sync-status.pending{color:var(--pink);animation:pulsedot 1s infinite}
.modal-btn-sm{padding:8px 16px;width:auto;display:inline-block;margin-top:0;font-size:10px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--pink),var(--cyan));color:#fff;font-family:var(--mono);cursor:pointer;transition:opacity 0.2s}
.modal-btn-sm:hover{opacity:0.85}
.modal-btn-out{background:var(--surface3);border:1px solid var(--border-hi);color:var(--muted);cursor:pointer;font-family:var(--mono);font-size:10px;padding:8px 16px;border-radius:var(--radius-sm);transition:all 0.15s;display:block;width:100%;text-align:center;margin-top:14px}

</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import {
  getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword,
  onAuthStateChanged, signOut, updateProfile, updatePassword as fbUpdatePassword
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
import {
  getFirestore, doc, setDoc, getDoc, onSnapshot, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4OJcdcGsNAvfRvV3LvbSLzZA8W8e9amk",
  authDomain: "hyperspeed-69a64.firebaseapp.com",
  projectId: "hyperspeed-69a64",
  storageBucket: "hyperspeed-69a64.firebasestorage.app",
  messagingSenderId: "99441435910",
  appId: "1:99441435910:web:fa1232497c212c2bd36a87",
  measurementId: "G-6SSE45CTH5"
};

const app = initializeApp(firebaseConfig);
getAnalytics(app);
const auth = getAuth(app);
const db = getFirestore(app);

window._hs_auth = auth;
window._hs_db = db;
window._hs_fbFns = { createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updateProfile, fbUpdatePassword, doc, setDoc, getDoc, onSnapshot, serverTimestamp };

// Auth state
onAuthStateChanged(auth, async user => {
  window._hs_user = user;
  if (user) {
    updateAccountUI(user);
    await syncFromCloud(user.uid);
    setupCloudSync(user.uid);
  } else {
    updateAccountUI(null);
  }
});

async function syncFromCloud(uid) {
  const { getDoc: gd, doc: d } = window._hs_fbFns;
  try {
    const snap = await gd(d(db, 'users', uid));
    if (snap.exists()) {
      const data = snap.data();
      if (data.bookmarks) {
        window.bookmarks = data.bookmarks;
        localStorage.setItem('hs-bookmarks', JSON.stringify(data.bookmarks));
        renderBookmarksBar();
        updateBookmarkBtn(tabs[activeTabId]?.url || '');
      }
      if (data.history) {
        window.history_list = data.history;
        localStorage.setItem('hs-history', JSON.stringify(data.history));
      }
    }
  } catch(e) { console.warn('sync read fail', e); }
}

function setupCloudSync(uid) {
  // Live listener for changes from other devices
  const { onSnapshot: os, doc: d } = window._hs_fbFns;
  window._hs_unsub = os(d(db, 'users', uid), snap => {
    if (!snap.exists()) return;
    const data = snap.data();
    // Only update if different to avoid loops
    if (data.bookmarks && JSON.stringify(data.bookmarks) !== JSON.stringify(window.bookmarks)) {
      window.bookmarks = data.bookmarks;
      localStorage.setItem('hs-bookmarks', JSON.stringify(data.bookmarks));
      renderBookmarksBar();
      updateBookmarkBtn(tabs[activeTabId]?.url || '');
    }
    if (data.history && JSON.stringify(data.history) !== JSON.stringify(window.history_list)) {
      window.history_list = data.history;
      localStorage.setItem('hs-history', JSON.stringify(data.history));
    }
  });
}

window.cloudSave = async function(field, value) {
  const user = window._hs_user;
  if (!user) return;
  const { doc: d, setDoc: sd, serverTimestamp: ts } = window._hs_fbFns;
  const el = document.getElementById(field === 'bookmarks' ? 'sync-bm' : 'sync-hist');
  if (el) { el.textContent = 'saving…'; el.className = 'sync-status pending'; }
  try {
    await sd(d(db, 'users', user.uid), { [field]: value, updatedAt: ts() }, { merge: true });
    if (el) { el.textContent = 'synced'; el.className = 'sync-status'; }
  } catch(e) {
    if (el) { el.textContent = 'error'; el.className = 'sync-status'; el.style.color = '#ef4444'; }
    console.warn('cloud save fail', e);
  }
};

window.doSignIn = async function() {
  const email = document.getElementById('si-email').value.trim();
  const pw = document.getElementById('si-pw').value;
  const btn = document.getElementById('si-btn');
  const err = document.getElementById('si-err');
  err.textContent = '';
  btn.disabled = true;
  try {
    await signInWithEmailAndPassword(auth, email, pw);
    closeAccountModal();
    toast('Signed in', 'fa-solid fa-circle-user');
  } catch(e) {
    err.textContent = friendlyError(e.code);
  } finally { btn.disabled = false; }
};

window.doRegister = async function() {
  const name = document.getElementById('reg-name').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const pw = document.getElementById('reg-pw').value;
  const btn = document.getElementById('reg-btn');
  const err = document.getElementById('reg-err');
  err.textContent = '';
  if (!name) { err.textContent = 'display name required'; return; }
  btn.disabled = true;
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await updateProfile(cred.user, { displayName: name });
    closeAccountModal();
    toast('Account created — welcome!', 'fa-solid fa-star');
  } catch(e) {
    err.textContent = friendlyError(e.code);
  } finally { btn.disabled = false; }
};

window.doSignOut = async function() {
  if (window._hs_unsub) window._hs_unsub();
  await signOut(auth);
  closeAccountModal();
  toast('Signed out', 'fa-solid fa-arrow-right-from-bracket');
};

window.updateDisplayName = async function() {
  const name = document.getElementById('new-name').value.trim();
  const err = document.getElementById('user-err');
  err.textContent = '';
  if (!name) return;
  try {
    await updateProfile(auth.currentUser, { displayName: name });
    updateAccountUI(auth.currentUser);
    document.getElementById('new-name').value = '';
    toast('Display name updated', 'fa-solid fa-user');
  } catch(e) { err.textContent = friendlyError(e.code); }
};

window.updatePassword = async function() {
  const pw = document.getElementById('new-pw').value;
  const err = document.getElementById('user-err');
  err.textContent = '';
  if (pw.length < 6) { err.textContent = 'password must be at least 6 characters'; return; }
  try {
    await fbUpdatePassword(auth.currentUser, pw);
    document.getElementById('new-pw').value = '';
    toast('Password updated', 'fa-solid fa-lock');
  } catch(e) { err.textContent = friendlyError(e.code); }
};

function friendlyError(code) {
  const map = {
    'auth/invalid-email': 'invalid email address',
    'auth/user-not-found': 'no account with that email',
    'auth/wrong-password': 'incorrect password',
    'auth/invalid-credential': 'incorrect email or password',
    'auth/email-already-in-use': 'email already in use',
    'auth/weak-password': 'password too weak (min 6 chars)',
    'auth/too-many-requests': 'too many attempts — try later',
    'auth/requires-recent-login': 'please sign out and sign back in first',
  };
  return map[code] || code;
}

<script>
// ── State ──────────────────────────────────────────────────────────────────
let tabs = {};
let activeTabId = null;
let tabCounter = 0;
let clockInterval = null;
let _navStart = null;
let _tickTimer = null;
let bookmarks = JSON.parse(localStorage.getItem('hs-bookmarks') || '[]');
let history_list = JSON.parse(localStorage.getItem('hs-history') || '[]');
let bookmarksBarVisible = false;
let dragSrcTabId = null;
// Find state
let findMatches = [];
let findIdx = 0;
let findActiveTabId = null;

function genId() { return 'tab-' + (++tabCounter); }

// ── Tab management ─────────────────────────────────────────────────────────
function newTab(url = 'hyperspeed://newtab') {
  const id = genId();
  tabs[id] = { id, url, history:[url], histIdx:0, title:'new tab', favicon:'fa-solid fa-house', pinned:false, muted:false };
  const pane = document.createElement('div');
  pane.className = 'tab-pane';
  pane.id = 'pane-' + id;
  document.getElementById('viewport').appendChild(pane);
  renderTabStrip();
  switchTab(id);
  updateTabWidths();
  return id;
}

function closeTab(id, e) {
  if (e) { e.stopPropagation(); e.preventDefault(); }
  const ids = getTabOrder();
  if (ids.length === 1) newTab();
  if (activeTabId === id) {
    const idx = ids.indexOf(id);
    const next = ids[idx+1] || ids[idx-1];
    if (next && next !== id) switchTab(next);
  }
  const pane = document.getElementById('pane-' + id);
  if (pane) pane.remove();
  delete tabs[id];
  renderTabStrip();
  updateTabWidths();
}

function getTabOrder() {
  return [...document.querySelectorAll('.tab')].map(t => t.dataset.id).filter(Boolean);
}

function switchTab(id) {
  if (!tabs[id]) return;
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  const pane = document.getElementById('pane-' + id);
  if (pane) {
    pane.classList.add('active');
    if (!pane.hasChildNodes()) {
      const tab = tabs[id];
      if (tab.url.startsWith('hyperspeed://')) renderPane(id, tab.url.replace('hyperspeed://',''));
      else renderWeb(id, tab.url);
    }
  }
  activeTabId = id;
  renderTabStrip();
  const tab = tabs[id];
  document.getElementById('url-bar').value = tab.url;
  updateChromeNav();
  updateSidebarActive(tab.url);
  updateLockIcon(tab.url);
  updateBookmarkBtn(tab.url);
  // Clear find when switching tabs
  clearFindHighlights();
}

function duplicateTab(id) {
  const src = tabs[id]; if (!src) return;
  newTab(src.url);
  toast('Tab duplicated','fa-solid fa-clone');
}

function pinTab(id) {
  if (!tabs[id]) return;
  tabs[id].pinned = !tabs[id].pinned;
  renderTabStrip();
  toast(tabs[id].pinned ? 'Tab pinned' : 'Tab unpinned','fa-solid fa-thumbtack');
}

function muteTab(id) {
  if (!tabs[id]) return;
  tabs[id].muted = !tabs[id].muted;
  renderTabStrip();
}

function renderTabStrip() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  const pinned = Object.values(tabs).filter(t => t.pinned);
  const normal = Object.values(tabs).filter(t => !t.pinned);
  [...pinned, ...normal].forEach(tab => {
    const el = document.createElement('div');
    el.className = 'tab' + (tab.id === activeTabId ? ' active' : '') + (tab.muted ? ' muted' : '');
    el.dataset.id = tab.id;
    el.draggable = true;
    if (tab.pinned) el.style.cssText += 'width:38px;min-width:38px;padding:0 8px;';
    el.innerHTML = `
      <span class="tab-spinner"></span>
      <span class="tab-favicon"><i class="${tab.favicon}"></i></span>
      ${tab.pinned ? '' : `<span class="tab-title">${tab.title}</span>`}
      ${!tab.pinned ? `<span class="tab-mute" onclick="muteTab('${tab.id}');event.stopPropagation()"><i class="fa-solid ${tab.muted?'fa-volume-xmark':'fa-volume-low'}"></i></span>` : ''}
      ${!tab.pinned ? `<span class="tab-close" onclick="closeTab('${tab.id}',event)"><i class="fa-solid fa-xmark"></i></span>` : ''}
    `;
    el.addEventListener('click', () => switchTab(tab.id));
    el.addEventListener('contextmenu', e => showTabContextMenu(e, tab.id));
    el.addEventListener('dragstart', e => { dragSrcTabId = tab.id; el.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move'; });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-over'); });
    el.addEventListener('dragleave', () => el.classList.remove('drag-over'));
    el.addEventListener('drop', e => { e.preventDefault(); el.classList.remove('drag-over'); reorderTabDom(dragSrcTabId, tab.id); });
    bar.appendChild(el);
  });
  const plus = document.createElement('div');
  plus.className = 'tab-new-btn';
  plus.title = 'New tab (Ctrl+T)';
  plus.innerHTML = '<i class="fa-solid fa-plus"></i>';
  plus.onclick = () => newTab();
  bar.appendChild(plus);
}

function reorderTabDom(srcId, dstId) {
  if (srcId === dstId) return;
  const srcEl = document.querySelector(`.tab[data-id="${srcId}"]`);
  const dstEl = document.querySelector(`.tab[data-id="${dstId}"]`);
  if (srcEl && dstEl) dstEl.parentNode.insertBefore(srcEl, dstEl);
  toast('Tab moved','fa-solid fa-arrows-left-right');
}

function updateTabWidths() {
  const bar = document.getElementById('tab-bar');
  const count = Object.values(tabs).filter(t => !t.pinned).length;
  bar.classList.remove('compact','very-compact');
  if (count > 8) bar.classList.add('very-compact');
  else if (count > 5) bar.classList.add('compact');
}

// ── Context menu ───────────────────────────────────────────────────────────
function showTabContextMenu(e, tabId) {

  const tab = tabs[tabId]; if (!tab) return;
  const menu = document.getElementById('ctx-menu');

    <div class="ctx-item danger" onclick="closeTab('${tabId}');closeCtx()"><i class="fa-solid fa-xmark"></i> Close tab</div>

}
function closeCtx() { document.getElementById('ctx-menu').classList.remove('open'); }
function closeOtherTabs(keepId) { Object.keys(tabs).forEach(id => { if (id !== keepId) closeTab(id); }); }

document.addEventListener('click', () => closeCtx());
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { closeCtx(); closeFindBar(); closeAccountModal(); }
  if ((e.ctrlKey||e.metaKey) && e.key === 't') { e.preventDefault(); newTab(); }
  if ((e.ctrlKey||e.metaKey) && e.key === 'w') { e.preventDefault(); closeTab(activeTabId); }
  if ((e.ctrlKey||e.metaKey) && e.key === 'f') { e.preventDefault(); toggleFind(); }
  if ((e.ctrlKey||e.metaKey) && e.key === 'l') { e.preventDefault(); document.getElementById('url-bar').focus(); }
  if ((e.ctrlKey||e.metaKey) && e.key === 'd') { e.preventDefault(); toggleBookmark(); }
  if ((e.ctrlKey||e.metaKey) && e.key === 'r') { e.preventDefault(); reloadPage(); }
  if ((e.ctrlKey||e.metaKey) && e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key)-1;
    const ids = getTabOrder();
    if (ids[idx]) { switchTab(ids[idx]); e.preventDefault(); }
  }
});

// ── Navigation ─────────────────────────────────────────────────────────────
function tabNavigate(id, url, push=true) {
  if (!id || !tabs[id]) id = activeTabId;
  if (!url) return;
  if (!url.includes('://') && !url.startsWith('/')) {
    url = looksLikeUrl(url) ? (url.startsWith('http') ? url : 'https://'+url)
      : 'https://www.bing.com/search?q='+encodeURIComponent(url);
  }
  const tab = tabs[id];
  if (push) { tab.history = tab.history.slice(0, tab.histIdx+1); tab.history.push(url); tab.histIdx = tab.history.length-1; }
  tab.url = url;
  if (url.startsWith('hyperspeed://')) {
    const page = url.replace('hyperspeed://','');
    tab.title = page; tab.favicon = pageIcon(page);
    renderPane(id, page);
  } else {
    tab.title = truncateUrl(url); tab.favicon = 'fa-solid fa-globe';
    renderWeb(id, url); addHistory(url);
  }
  if (id === activeTabId) {
    document.getElementById('url-bar').value = url;
    updateChromeNav(); updateSidebarActive(url); updateLockIcon(url); updateBookmarkBtn(url);
  }
  renderTabStrip();
}

function pageIcon(p) { return {newtab:'fa-solid fa-house',games:'fa-solid fa-gamepad',movies:'fa-solid fa-film',ai:'fa-solid fa-robot',settings:'fa-solid fa-gear',about:'fa-solid fa-circle-info',history:'fa-solid fa-clock-rotate-left'}[p]||'fa-solid fa-house'; }
function truncateUrl(url) { try { return new URL(url).hostname.replace('www.',''); } catch { return url.substring(0,28); } }
function looksLikeUrl(s) { return /^https?:\/\//i.test(s) || /^[\w-]+\.[a-z]{2,}/i.test(s); }
function updateLockIcon(url) {
  const icon = document.getElementById('url-lock');
  if (url.startsWith('https://')) { icon.className='url-lock secure fa-solid fa-lock'; }
  else if (url.startsWith('http://')) { icon.className='url-lock fa-solid fa-lock-open'; }
  else { icon.className=''; }
}

// ── Timer ──────────────────────────────────────────────────────────────────
function timerStart() {
  _navStart = performance.now();
  if (_tickTimer) clearInterval(_tickTimer);
  const pill = document.getElementById('load-pill');
  pill.className = 'pill load-pill loading';
  const tabEl = document.querySelector(`.tab[data-id="${activeTabId}"]`);
  if (tabEl) tabEl.classList.add('loading');
  _tickTimer = setInterval(() => {
    const ms = performance.now() - _navStart;
    pill.textContent = ms < 1000 ? Math.round(ms)+'ms' : (ms/1000).toFixed(2)+'s';
  }, 50);
}
function timerStop() {
  if (!_navStart) return;
  if (_tickTimer) { clearInterval(_tickTimer); _tickTimer = null; }
  const ms = performance.now() - _navStart;
  const pill = document.getElementById('load-pill');
  pill.textContent = ms < 1000 ? Math.round(ms)+'ms' : (ms/1000).toFixed(2)+'s';
  pill.className = 'pill load-pill done';
  _navStart = null;
  document.querySelectorAll('.tab.loading').forEach(t => t.classList.remove('loading'));
}

// ── Render ─────────────────────────────────────────────────────────────────
async function renderPane(id, page) {
  const pane = document.getElementById('pane-'+id); if (!pane) return;
  pane.innerHTML = '';
  if (page === 'newtab') {
    const view = document.createElement('div');
    view.className = 'internal-view';
    view.innerHTML = buildNewTab();
    pane.appendChild(view);
    setupNewTab(view);
    timerStart(); setTimeout(timerStop, 80);
  } else if (page === 'history') {
    const view = document.createElement('div');
    view.className = 'internal-view';
    view.innerHTML = buildHistoryPage();
    pane.appendChild(view);
    timerStart(); setTimeout(timerStop, 60);
  } else {
    const frame = document.createElement('iframe');
    frame.style.cssText = 'width:100%;height:100%;border:none;background:transparent;';
    frame.src = '/pages/'+page+'.html';
    timerStart(); frame.onload = () => timerStop();
    pane.appendChild(frame);
  }
}

function renderWeb(id, url) {
  const pane = document.getElementById('pane-'+id); if (!pane) return;
  pane.innerHTML = '';
  const frame = document.createElement('iframe');
  frame.sandbox = 'allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation';
  const encoded = (typeof __hyperspeed$config !== 'undefined')
    ? __hyperspeed$config.encodeUrl(url)
    : encodeURIComponent(btoa(url));
  frame.src = '/hypertunnel/'+encoded;
  timerStart(); frame.onload = () => timerStop();
  pane.appendChild(frame);
}

function goForward() { const t = tabs[activeTabId]; if (!t||t.histIdx>=t.history.length-1) return; t.histIdx++; tabNavigate(activeTabId,t.history[t.histIdx],false); }

// ── Find in page ───────────────────────────────────────────────────────────
// Find works on the active internal-view (newtab, history pages).
// For iframe pages we inject a helper via postMessage.

function toggleFind() {
  const bar = document.getElementById('find-bar');
  if (bar.classList.contains('open')) { closeFindBar(); return; }
  bar.classList.add('open');
  document.getElementById('find-input').focus();
  document.getElementById('btn-find').classList.add('active');
}

function closeFindBar() {
  document.getElementById('find-bar').classList.remove('open');
  document.getElementById('btn-find').classList.remove('active');
  clearFindHighlights();
  document.getElementById('find-count').textContent = '0/0';
}

function handleFindKey(e) {
  if (e.key === 'Enter') { e.shiftKey ? findStep(-1) : findStep(1); }
  if (e.key === 'Escape') closeFindBar();
}

function clearFindHighlights() {
  const pane = document.getElementById('pane-'+activeTabId);
  if (!pane) return;
  const view = pane.querySelector('.internal-view');
  if (!view) return;
  // Remove all mark spans
  view.querySelectorAll('mark.find-highlight').forEach(m => {
    m.replaceWith(document.createTextNode(m.textContent));
  });
  // Normalize text nodes
  view.normalize();
  findMatches = [];
  findIdx = 0;
  findActiveTabId = null;
}

function runFind() {
  clearFindHighlights();
  const query = document.getElementById('find-input').value;
  if (!query) { document.getElementById('find-count').textContent = '0/0'; return; }

  const pane = document.getElementById('pane-'+activeTabId);
  if (!pane) return;
  const view = pane.querySelector('.internal-view');

  if (view) {
    // Internal page — walk text nodes
    findMatches = [];
    findIdx = 0;
    findActiveTabId = activeTabId;
    const walker = document.createTreeWalker(view, NodeFilter.SHOW_TEXT, {
      acceptNode: n => {
        const tag = n.parentElement?.tagName;
        if (['SCRIPT','STYLE','INPUT','TEXTAREA'].includes(tag)) return NodeFilter.FILTER_REJECT;
        return n.textContent.toLowerCase().includes(query.toLowerCase()) ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_SKIP;
      }
    });
    const nodes = [];
    while (walker.nextNode()) nodes.push(walker.currentNode);

    nodes.forEach(node => {
      const text = node.textContent;
      const lc = text.toLowerCase();
      const ql = query.toLowerCase();
      const frag = document.createDocumentFragment();
      let last = 0, pos;
      while ((pos = lc.indexOf(ql, last)) !== -1) {
        if (pos > last) frag.appendChild(document.createTextNode(text.slice(last, pos)));
        const mark = document.createElement('mark');
        mark.className = 'find-highlight';
        mark.textContent = text.slice(pos, pos + query.length);
        frag.appendChild(mark);
        findMatches.push(mark);
        last = pos + query.length;
      }
      if (last < text.length) frag.appendChild(document.createTextNode(text.slice(last)));
      node.parentNode.replaceChild(frag, node);
    });

    updateFindCount();
    if (findMatches.length) scrollToMatch(0);
  } else {
    // iframe page — use window.find as fallback
    document.getElementById('find-count').textContent = '—';
  }
}

function scrollToMatch(idx) {
  if (!findMatches.length) return;
  // De-highlight previous
  findMatches.forEach(m => m.classList.remove('current'));
  findIdx = ((idx % findMatches.length) + findMatches.length) % findMatches.length;
  const m = findMatches[findIdx];
  m.classList.add('current');
  m.scrollIntoView({ behavior:'smooth', block:'center' });
  updateFindCount();
}

function findStep(dir) {
  if (!findMatches.length) { runFind(); return; }
  scrollToMatch(findIdx + dir);
}

function updateFindCount() {
  const count = document.getElementById('find-count');
  if (!findMatches.length) { count.textContent = '0/0'; return; }
  count.textContent = `${findIdx+1}/${findMatches.length}`;
}

const SUGGESTIONS = [
  {icon:'fa-solid fa-gamepad', label:'hyperspeed://games', hint:'Games library'},

  {icon:'fa-brands fa-google', label:'google.com', hint:'Google Search'},

  {icon:'fa-brands fa-github', label:'github.com', hint:'GitHub'},
];

function setupNewTab(view) {
  const search = view.querySelector('#nt-search');
  const sug = view.querySelector('#nt-suggestions');
  if (search) {
    search.addEventListener('keydown', e => {
      if (e.key === 'Enter') { sug.classList.remove('open'); tabNavigate(activeTabId, e.target.value.trim()); }
    });
    search.addEventListener('input', () => {
      const v = search.value.trim().toLowerCase();
      if (!v) { sug.classList.remove('open'); return; }
      const matches = SUGGESTIONS.filter(s => s.label.includes(v) || s.hint.toLowerCase().includes(v));
      if (!matches.length) { sug.classList.remove('open'); return; }
      sug.innerHTML = matches.map(s => `<div class="nt-sug-item" onclick="tabNavigate(activeTabId,'${s.label}')"><i class="${s.icon}"></i><span>${s.label}</span><span style="margin-left:auto;font-size:9px;color:var(--muted)">${s.hint}</span></div>`).join('');
      sug.classList.add('open');
    });
    search.addEventListener('blur', () => setTimeout(() => sug.classList.remove('open'), 150));
  }
  if (clockInterval) clearInterval(clockInterval);
  tickClock();
  clockInterval = setInterval(tickClock, 1000);
}

function tickClock() {
  const el = document.getElementById('nt-clock'); if (!el) return;
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  el.textContent = `${days[now.getDay()]}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}

// ── Account UI ─────────────────────────────────────────────────────────────
function updateAccountUI(user) {
  const btn = document.getElementById('acct-btn');
  const icon = document.getElementById('acct-icon');

  if (user) {
    const name = user.displayName || user.email || '?';

    btn.title = name;

      sp.className = 'acct-initials';
      sp.style.cssText = 'font-size:11px;font-weight:600;font-family:var(--mono);color:#fff;pointer-events:none';
      btn.appendChild(sp);
    }
    btn.querySelector('.acct-initials').textContent = initials;

    document.getElementById('user-email').textContent = user.email;

    btn.classList.add('guest');

  document.getElementById('modal-backdrop').classList.remove('open');
}

document.getElementById('modal-backdrop').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-backdrop')) closeAccountModal();
});

function switchAuthTab(which) {
  document.getElementById('tab-signin').classList.toggle('active', which==='signin');
  document.getElementById('tab-register').classList.toggle('active', which==='register');
  document.getElementById('form-signin').style.display = which==='signin' ? 'block' : 'none';
  document.getElementById('form-register').style.display = which==='register' ? 'block' : 'none';
}

// Enter key submit support for auth forms
['si-email','si-pw'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') doSignIn(); });
});
['reg-name','reg-email','reg-pw'].forEach(id => {
  document.getElementById(id)?.addEventListener('keydown', e => { if (e.key==='Enter') doRegister(); });
});

// ── Service Worker ─────────────────────────────────────────────────────────
async function registerSW() {
  const dot = document.getElementById('sw-dot');
  const lbl = document.getElementById('sw-label');
  const set = (cls,txt) => { dot.className='pill-dot '+cls; lbl.textContent=txt; };
  if (!('serviceWorker' in navigator)) { set('err','unsupported'); return; }
  set('spin','init');
  try {
    const reg = await navigator.serviceWorker.register('/sw.js', {scope:'/',updateViaCache:'none'});
    if (reg.waiting) reg.waiting.postMessage({type:'skip'});
    await navigator.serviceWorker.ready;
    if (!navigator.serviceWorker.controller) {
      navigator.serviceWorker.addEventListener('controllerchange', () => location.reload(), {once:true});
      return;
    }
    for (let i=0; i<25; i++) {
      try {
        const r = await fetch('/sw-check', {cache:'no-store'});
        if (r.ok && (await r.json()).ok) { set('ok','ready'); return; }
      } catch {}
      await new Promise(r => setTimeout(r,200));
    }
    set('err','error');
  } catch { set('err','failed'); }
}

// ── Init ───────────────────────────────────────────────────────────────────
newTab('hyperspeed://newtab');
registerSW();
const _cfgScript = document.createElement('script');
_cfgScript.src = '/hyperspeed/hyperspeed.config.js';
document.head.appendChild(_cfgScript);
</script>
