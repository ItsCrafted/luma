<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Hyperspeed</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pink:#e879c8;
  --pink-dim:rgba(232,121,200,0.18);
  --pink-glow:rgba(232,121,200,0.35);
  --cyan:#22d4f5;
  --cyan-dim:rgba(34,212,245,0.15);
  --cyan-glow:rgba(34,212,245,0.3);
  --gold:#f5c842;
  --violet:#7c3aed;

  /* Glass — tuned for deep-space bg: more opaque, warmer tints */
  --glass-bg:rgba(12,6,32,0.55);
  --glass-bg-hi:rgba(18,8,48,0.70);
  --glass-bg-med:rgba(14,7,38,0.62);
  --glass-border:rgba(255,255,255,0.10);
  --glass-border-hi:rgba(255,255,255,0.22);
  --glass-border-pk:rgba(232,121,200,0.30);
  --glass-border-cy:rgba(34,212,245,0.28);

  /* Shadows with nebula color bleeding */
  --glass-shadow:0 4px 24px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.07) inset, 0 0 0 0.5px rgba(255,255,255,0.06) inset;
  --glass-shadow-lg:0 16px 56px rgba(0,0,0,0.6), 0 1px 0 rgba(255,255,255,0.10) inset;
  --glow-pk:0 0 20px rgba(232,121,200,0.25), 0 0 60px rgba(232,121,200,0.08);
  --glow-cy:0 0 20px rgba(34,212,245,0.2), 0 0 60px rgba(34,212,245,0.07);

  --text:#e8e0f8;
  --text-dim:rgba(220,210,245,0.60);
  --text-muted:rgba(200,190,230,0.32);
  --mono:'Space Mono',monospace;
  --sans:'Outfit',sans-serif;
  --spring:cubic-bezier(0.34,1.56,0.64,1);
  --out:cubic-bezier(0.16,1,0.3,1);
  --r-sm:8px;--r-md:14px;--r-lg:20px;--r-xl:28px;--r-pill:999px;
  --sidebar-w:60px;--tabs-h:50px;--chrome-h:52px;
}

html,body{height:100%;overflow:hidden;font-family:var(--sans);color:var(--text)}

/* ── Background ── */
.bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(120,0,180,0.35) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(0,80,160,0.30) 0%, transparent 55%),
    radial-gradient(ellipse at 60% 80%, rgba(0,140,120,0.25) 0%, transparent 50%),
    #0a0514;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 5% 8%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 12% 3%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 18% 14%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 25% 6%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 30% 18%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 38% 4%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 43% 22%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 11%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 57% 2%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 63% 17%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(2px 2px at 70% 7%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 77% 25%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 83% 12%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 90% 5%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 95% 19%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 8% 32%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 15% 42%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(2px 2px at 22% 36%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 29% 48%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 35% 30%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 42% 44%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 48% 33%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 47%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 61% 38%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(2px 2px at 68% 50%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 74% 35%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 81% 43%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 88% 31%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 94% 46%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 3% 55%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 10% 62%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(2px 2px at 17% 70%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 24% 58%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 31% 74%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 39% 63%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 46% 55%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 52% 68%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 59% 57%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(2px 2px at 66% 72%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 60%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 79% 66%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 86% 75%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 59%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 98% 67%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 6% 82%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(2px 2px at 13% 88%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 78%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 27% 92%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 33% 83%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 40% 95%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 47% 80%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(2px 2px at 54% 90%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(1px 1px at 60% 84%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 67% 93%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 73% 79%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1px 1px at 80% 87%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 87% 96%, rgba(255,255,255,0.9) 0%,transparent 100%),
    radial-gradient(2px 2px at 93% 81%, rgba(255,255,255,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 99% 89%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(1px 1px at 4% 97%, rgba(255,255,255,0.8) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 36% 97%, rgba(255,255,255,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 98%, rgba(255,255,255,0.7) 0%,transparent 100%),
    radial-gradient(2px 2px at 97% 97%, rgba(255,255,255,0.9) 0%,transparent 100%);
  animation:starTwinkle 6s ease-in-out infinite alternate;
}
@keyframes starTwinkle{from{opacity:0.5}to{opacity:1}}

.bg-overlay{
  position:fixed;inset:0;z-index:1;
  background:linear-gradient(
    160deg,
    rgba(100,0,160,0.12) 0%,
    transparent 40%,
    rgba(0,100,160,0.08) 70%,
    transparent 100%
  );
}

/* ── Glass base ── */
.glass{
  background:var(--glass-bg);
  backdrop-filter:blur(28px) saturate(140%);
  -webkit-backdrop-filter:blur(28px) saturate(140%);
  border:0.5px solid var(--glass-border);
  box-shadow:var(--glass-shadow);
}
.glass-hi{
  background:var(--glass-bg-hi);
  backdrop-filter:blur(40px) saturate(160%);
  -webkit-backdrop-filter:blur(40px) saturate(160%);
  border:0.5px solid var(--glass-border-hi);
  box-shadow:var(--glass-shadow-lg);
}

/* ── Layout ── */
.browser{
  position:relative;z-index:2;
  display:grid;
  grid-template-rows:var(--tabs-h) var(--chrome-h) 0px 1fr;
  grid-template-columns:var(--sidebar-w) 1fr;
  height:100vh;
  transition:grid-template-rows 0.3s var(--out);
}
.browser.bm-open{grid-template-rows:var(--tabs-h) var(--chrome-h) 34px 1fr}

/* ── Sidebar ── */
.sidebar{
  grid-row:1/5;grid-column:1;
  display:flex;flex-direction:column;align-items:center;
  padding:10px 0 14px;gap:3px;z-index:200;
  background:rgba(6,3,18,0.72);
  backdrop-filter:blur(48px) saturate(120%);
  -webkit-backdrop-filter:blur(48px) saturate(120%);
  border-right:0.5px solid rgba(232,121,200,0.12);
  box-shadow:1px 0 0 rgba(255,255,255,0.03);
  animation:sideIn 0.5s var(--spring) both;
}
@keyframes sideIn{from{transform:translateX(-100%);opacity:0}to{transform:none;opacity:1}}

.logo-btn{
  width:38px;height:38px;border-radius:var(--r-md);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:10px;flex-shrink:0;
  transition:transform 0.35s var(--spring);
}
.logo-btn:hover{transform:scale(1.2) rotate(-8deg)}
.logo-btn img{width:30px;height:30px;object-fit:contain;
  filter:drop-shadow(0 0 8px var(--pink)) drop-shadow(0 0 18px var(--pink-glow));
  animation:logoFloat 4s ease-in-out infinite;}
@keyframes logoFloat{
  0%,100%{filter:drop-shadow(0 0 8px var(--pink)) drop-shadow(0 0 18px var(--pink-glow))}
  50%{filter:drop-shadow(0 0 10px var(--cyan)) drop-shadow(0 0 24px var(--cyan-glow))}
}

.nav-btn{
  width:38px;height:38px;border-radius:var(--r-md);
  background:none;border:0.5px solid transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);font-size:14px;
  transition:all 0.2s var(--spring);position:relative;flex-shrink:0;
}
.nav-btn:hover{
  background:rgba(232,121,200,0.08);
  border-color:rgba(232,121,200,0.20);
  color:var(--text-dim);
  transform:scale(1.08) translateX(1px);
}
.nav-btn:active{transform:scale(0.90)}
.nav-btn.active{
  background:linear-gradient(145deg,rgba(232,121,200,0.18),rgba(34,212,245,0.10));
  border-color:rgba(232,121,200,0.35);
  color:var(--pink);
  box-shadow:0 0 12px rgba(232,121,200,0.15), inset 0 0 8px rgba(232,121,200,0.05);
}
.nav-btn.active i{animation:iconPop 0.32s var(--spring)}
@keyframes iconPop{0%{transform:scale(0.3)}65%{transform:scale(1.22)}100%{transform:scale(1)}}
.nav-tip{
  position:absolute;left:calc(100% + 10px);top:50%;
  transform:translateY(-50%) translateX(-6px);
  background:rgba(6,3,18,0.88);
  backdrop-filter:blur(20px);
  border:0.5px solid rgba(232,121,200,0.25);
  color:var(--text-dim);font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
  padding:5px 12px;white-space:nowrap;
  pointer-events:none;opacity:0;
  transition:opacity 0.15s,transform 0.18s var(--out);
  border-radius:var(--r-pill);z-index:9999;
  text-transform:uppercase;
}
.nav-btn:hover .nav-tip{opacity:1;transform:translateY(-50%) translateX(0)}
.sidebar-space{flex:1}
.sidebar-div{
  width:22px;height:0.5px;
  background:linear-gradient(90deg,transparent,rgba(232,121,200,0.2),transparent);
  flex-shrink:0;margin:6px 0;
}

/* Account button */
.acct-btn{
  width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--cyan));
  border:1px solid rgba(255,255,255,0.25);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:10px;font-weight:700;color:#fff;
  transition:all 0.25s var(--spring);flex-shrink:0;position:relative;
  box-shadow:0 0 16px var(--pink-glow);
}
.acct-btn:hover{transform:scale(1.15);box-shadow:0 0 24px var(--pink-glow)}
.acct-btn.guest{
  background:rgba(255,255,255,0.05);
  border-color:rgba(255,255,255,0.10);
  box-shadow:none;color:var(--text-muted);
}
.acct-btn .nav-tip{font-size:9px}

/* ── Tab Bar ── */
.tab-bar{
  grid-row:1;grid-column:2;
  display:flex;align-items:flex-end;
  padding:8px 10px 0;gap:3px;
  overflow-x:auto;overflow-y:hidden;scrollbar-width:none;
  background:transparent;
  animation:slideDown 0.4s var(--spring) 0.06s both;
}
@keyframes slideDown{from{transform:translateY(-110%);opacity:0}to{transform:none;opacity:1}}
.tab-bar::-webkit-scrollbar{display:none}

.tab{
  display:flex;align-items:center;gap:7px;
  padding:0 10px 0 13px;
  min-width:0;width:160px;height:36px;flex-shrink:0;
  border-radius:var(--r-md) var(--r-md) 0 0;
  cursor:pointer;position:relative;
  font-family:var(--mono);font-size:9px;letter-spacing:0.5px;
  color:var(--text-muted);
  background:rgba(6,3,18,0.40);
  border:0.5px solid rgba(255,255,255,0.07);border-bottom:none;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  transition:background 0.18s,color 0.18s,transform 0.2s var(--spring),box-shadow 0.2s;
  user-select:none;overflow:hidden;
  transform-origin:bottom center;
}
.tab::before{
  content:'';position:absolute;top:0;left:0;right:0;height:0.5px;
  background:rgba(255,255,255,0.10);
}
.tab.tab-enter{animation:tabBounceIn 0.36s var(--spring) both}
@keyframes tabBounceIn{
  0%{transform:translateY(18px) scaleX(0.5) scaleY(0.6);opacity:0}
  55%{transform:translateY(-3px) scaleX(1.03)}
  100%{transform:none;opacity:1}
}
.tab.tab-exit{animation:tabOut 0.20s var(--out) forwards;pointer-events:none}
@keyframes tabOut{to{transform:scaleX(0) scaleY(0.7);opacity:0;max-width:0;padding:0;margin:0}}
.tab:hover{background:rgba(232,121,200,0.06);color:var(--text-dim);transform:translateY(-1px)}
.tab.active{
  background:rgba(10,5,28,0.80);
  color:var(--text);
  border-color:rgba(232,121,200,0.22);border-bottom:none;
  box-shadow:0 -4px 20px rgba(0,0,0,0.3),0 0 0 0.5px rgba(232,121,200,0.10) inset;
  backdrop-filter:blur(40px);-webkit-backdrop-filter:blur(40px);
}
.tab.active::after{
  content:'';position:absolute;top:0;left:10px;right:10px;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--pink),var(--cyan),transparent);
  opacity:0.85;
}
.tab.dragging{opacity:0.35;transform:scale(0.88) rotate(1.5deg)}
.tab.drag-over{background:var(--cyan-dim);border-color:rgba(34,212,245,0.3)}
.tab-bar.compact .tab{width:110px}.tab-bar.very-compact .tab{width:60px;padding:0 8px}
.tab-fav{font-size:10px;flex-shrink:0;opacity:0.5;transition:all 0.2s}
.tab.active .tab-fav{opacity:1;color:var(--pink)}
.tab-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-spin{width:10px;height:10px;border:1.5px solid rgba(255,255,255,0.10);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0;display:none}
.tab.loading .tab-spin{display:block}.tab.loading .tab-fav{display:none}
@keyframes spin{to{transform:rotate(360deg)}}
.tab-close{
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;color:rgba(255,255,255,0.2);
  flex-shrink:0;transition:all 0.16s var(--spring);opacity:0;
}
.tab:hover .tab-close{opacity:1;color:rgba(255,255,255,0.45)}
.tab-close:hover{background:var(--pink-dim)!important;color:var(--pink)!important;transform:scale(1.3)}
.tab-mute{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-muted);flex-shrink:0;opacity:0;transition:all 0.15s;cursor:pointer}
.tab:hover .tab-mute{opacity:0.6}.tab.muted .tab-mute{opacity:1;color:var(--pink)}
.tab-new{
  width:30px;height:30px;flex-shrink:0;margin-bottom:3px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:12px;color:var(--text-muted);
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.09);
  border-radius:var(--r-md);
  backdrop-filter:blur(16px);
  transition:all 0.22s var(--spring);
}
.tab-new:hover{
  background:var(--pink-dim);
  border-color:rgba(232,121,200,0.35);
  color:var(--pink);
  transform:scale(1.14) rotate(90deg);
  box-shadow:var(--glow-pk);
}

/* ── Chrome ── */
.chrome{
  grid-row:2;grid-column:2;
  display:flex;align-items:center;gap:5px;padding:0 10px;
  background:rgba(6,3,18,0.60);
  backdrop-filter:blur(48px) saturate(130%);
  -webkit-backdrop-filter:blur(48px) saturate(130%);
  border-bottom:0.5px solid rgba(232,121,200,0.08);
  box-shadow:0 1px 0 rgba(255,255,255,0.03);
  animation:slideDown 0.4s var(--spring) 0.1s both;
}
.chr-btn{
  width:28px;height:28px;border-radius:var(--r-sm);
  background:none;border:0.5px solid transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);font-size:12px;
  transition:all 0.18s var(--spring);flex-shrink:0;
}
.chr-btn:hover{
  background:rgba(232,121,200,0.09);
  border-color:rgba(232,121,200,0.20);
  color:var(--text-dim);
  transform:scale(1.1);
}
.chr-btn:active{transform:scale(0.86)}
.chr-btn:disabled{opacity:0.15;cursor:default;pointer-events:none}
.chr-btn.lit{color:var(--pink);background:var(--pink-dim);border-color:rgba(232,121,200,0.28)}

/* URL bar */
.url-wrap{flex:1;position:relative;display:flex;align-items:center}
.url-bar{
  width:100%;
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border:0.5px solid rgba(255,255,255,0.10);
  border-radius:var(--r-pill);
  color:var(--text);font-family:var(--mono);font-size:10px;letter-spacing:0.3px;
  padding:7px 34px 7px 16px;outline:none;height:32px;
  transition:all 0.28s var(--out);
}
.url-bar::placeholder{color:var(--text-muted)}
.url-bar:focus{
  background:rgba(232,121,200,0.07);
  border-color:rgba(232,121,200,0.40);
  box-shadow:0 0 0 3px rgba(232,121,200,0.08), var(--glow-pk);
}
.url-lock{position:absolute;right:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:10px;pointer-events:none;transition:color 0.2s}
.url-lock.secure{color:var(--cyan)}
.bm-star{
  width:28px;height:28px;border-radius:var(--r-sm);
  background:none;border:0.5px solid transparent;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-muted);font-size:13px;
  transition:all 0.2s var(--spring);flex-shrink:0;
}
.bm-star:hover{transform:scale(1.22);color:var(--gold)}
.bm-star.saved{color:var(--gold);animation:starBurst 0.4s var(--spring)}
@keyframes starBurst{0%{transform:scale(0.2) rotate(-30deg)}65%{transform:scale(1.4) rotate(5deg)}100%{transform:scale(1)}}

.pills{display:flex;gap:4px;align-items:center}
.pill{
  display:flex;align-items:center;gap:5px;
  font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:1px;
  padding:4px 10px;border-radius:var(--r-pill);
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.08);
  flex-shrink:0;
}
.dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.15);transition:all 0.4s;flex-shrink:0}
.dot.ok{background:var(--cyan);box-shadow:0 0 6px var(--cyan-glow)}
.dot.err{background:#f87171}
.dot.spin{background:var(--pink);animation:dotpulse 0.9s ease-in-out infinite}
@keyframes dotpulse{0%,100%{opacity:1}50%{opacity:0.1}}
.load-pill{min-width:56px;justify-content:center;transition:all 0.3s}
.load-pill.loading{color:var(--pink);border-color:rgba(232,121,200,0.25)}
.load-pill.done{color:var(--cyan);border-color:rgba(34,212,245,0.25)}

/* ── Bookmarks bar ── */
.bm-bar{
  grid-row:3;grid-column:2;
  display:flex;align-items:center;padding:0 10px;gap:5px;
  overflow:hidden;overflow-x:auto;scrollbar-width:none;
  background:rgba(6,3,18,0.50);
  backdrop-filter:blur(30px);
  border-bottom:0.5px solid rgba(255,255,255,0.06);
  height:0;opacity:0;pointer-events:none;
  transition:opacity 0.25s var(--out);
}
.bm-bar::-webkit-scrollbar{display:none}
.browser.bm-open .bm-bar{height:34px;opacity:1;pointer-events:auto}
.bm-chip{
  display:flex;align-items:center;gap:5px;padding:3px 11px;
  border-radius:var(--r-pill);
  font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:0.8px;
  cursor:pointer;
  background:rgba(255,255,255,0.05);
  border:0.5px solid rgba(255,255,255,0.09);
  transition:all 0.2s var(--spring);white-space:nowrap;flex-shrink:0;
}
.bm-chip:hover{
  background:var(--pink-dim);
  border-color:rgba(232,121,200,0.28);
  color:var(--text);
  transform:translateY(-1px);
}
.bm-chip i{font-size:8px}
.bm-empty{font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:1px;white-space:nowrap}

/* ── Viewport ── */
.viewport{grid-row:4;grid-column:2;position:relative;overflow:hidden}
.tab-pane{position:absolute;inset:0;display:none;overflow:hidden}
.tab-pane.active{display:block}
.tab-pane.p-enter{animation:paneIn 0.30s var(--out) both}
.tab-pane.p-exit{animation:paneOut 0.20s var(--out) both;pointer-events:none}
@keyframes paneIn{from{opacity:0;transform:scale(0.975) translateY(10px)}to{opacity:1;transform:none}}
@keyframes paneOut{from{opacity:1}to{opacity:0;transform:scale(0.965) translateY(-6px)}}
.tab-pane iframe{width:100%;height:100%;border:none;background:transparent}
.iv{width:100%;height:100%;overflow-y:auto;display:flex;flex-direction:column}

/* ── Find bar ── */
.find-bar{
  position:absolute;top:12px;right:12px;z-index:600;
  display:none;align-items:center;gap:7px;
  padding:10px 14px;border-radius:var(--r-lg);
  background:rgba(6,3,18,0.80);
  backdrop-filter:blur(48px);-webkit-backdrop-filter:blur(48px);
  border:0.5px solid rgba(232,121,200,0.22);
  box-shadow:var(--glass-shadow-lg),var(--glow-pk);
}
.find-bar.open{display:flex;animation:findIn 0.28s var(--spring)}
@keyframes findIn{from{opacity:0;transform:translateY(-14px) scale(0.90)}to{opacity:1;transform:none}}
.find-in{
  background:rgba(255,255,255,0.06);
  border:0.5px solid rgba(255,255,255,0.12);
  border-radius:var(--r-pill);
  color:var(--text);font-family:var(--mono);font-size:10px;
  padding:5px 14px;outline:none;width:185px;
  transition:border-color 0.2s;
}
.find-in:focus{border-color:rgba(232,121,200,0.45)}
.find-in::placeholder{color:var(--text-muted)}
.find-ct{font-family:var(--mono);font-size:8px;color:var(--text-muted);white-space:nowrap;min-width:50px;text-align:center;letter-spacing:0.5px}
.find-nav{
  width:22px;height:22px;
  background:rgba(255,255,255,0.06);
  border:0.5px solid rgba(255,255,255,0.10);
  border-radius:var(--r-sm);
  color:var(--text-dim);font-size:9px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.14s var(--spring);
}
.find-nav:hover{background:var(--pink-dim);border-color:rgba(232,121,200,0.28);color:var(--pink);transform:scale(1.1)}

/* ── Context menu ── */
.ctx{
  position:fixed;z-index:9999;display:none;padding:5px;min-width:172px;
  border-radius:var(--r-lg);
  background:rgba(6,3,18,0.88);
  backdrop-filter:blur(48px);-webkit-backdrop-filter:blur(48px);
  border:0.5px solid rgba(232,121,200,0.18);
  box-shadow:0 24px 64px rgba(0,0,0,0.65),var(--glow-pk);
}
.ctx.open{display:block;animation:ctxIn 0.18s var(--spring)}
@keyframes ctxIn{from{opacity:0;transform:scale(0.86) translateY(-8px)}to{opacity:1;transform:none}}
.ctx-row{
  display:flex;align-items:center;gap:10px;
  padding:8px 12px;border-radius:var(--r-md);
  font-family:var(--mono);font-size:9px;color:var(--text-dim);
  cursor:pointer;transition:all 0.13s var(--spring);white-space:nowrap;letter-spacing:0.5px;
}
.ctx-row:hover{background:var(--pink-dim);color:var(--text);transform:translateX(3px)}
.ctx-row.red:hover{background:rgba(248,113,113,0.10);color:#f87171;transform:translateX(3px)}
.ctx-row i{width:13px;text-align:center;color:rgba(255,255,255,0.25)}
.ctx-sep{height:0.5px;background:rgba(255,255,255,0.07);margin:4px 0}

/* ── Toast ── */
.toasts{position:fixed;bottom:20px;right:20px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-radius:var(--r-lg);
  font-family:var(--mono);font-size:9px;color:var(--text);letter-spacing:0.8px;
  animation:toastIn 0.4s var(--spring) both;
  background:rgba(6,3,18,0.82);
  backdrop-filter:blur(40px);
  border:0.5px solid rgba(232,121,200,0.20);
  box-shadow:var(--glass-shadow-lg),var(--glow-pk);
}
.toast.out{animation:toastOut 0.24s var(--out) forwards}
.toast i{color:var(--pink)}
@keyframes toastIn{from{opacity:0;transform:translateY(20px) scale(0.80)}to{opacity:1;transform:none}}
@keyframes toastOut{to{opacity:0;transform:translateY(10px) scale(0.86)}}

/* ── New Tab ── */
.newtab{
  position:relative;z-index:1;flex:1;min-height:100%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:40px;gap:24px;background:transparent;
}
.nt-logo{display:flex;flex-direction:column;align-items:center;gap:12px;animation:ntUp 0.6s var(--spring) both}
.nt-emblem{position:relative;width:84px;height:84px;display:flex;align-items:center;justify-content:center}
.nt-emblem::before{
  content:'';position:absolute;inset:-12px;border-radius:50%;
  border:0.5px solid rgba(232,121,200,0.22);
  animation:ring 4s ease-in-out infinite;
}
.nt-emblem::after{
  content:'';position:absolute;inset:-26px;border-radius:50%;
  border:0.5px solid rgba(34,212,245,0.10);
  animation:ring 4s ease-in-out infinite;animation-delay:1.6s;
}
@keyframes ring{0%,100%{transform:scale(1);opacity:0.8}50%{transform:scale(1.06);opacity:0.2}}
.nt-emblem img{
  width:84px;height:84px;object-fit:contain;
  animation:imgFloat 4.5s ease-in-out infinite;
  filter:drop-shadow(0 0 18px var(--pink-glow));
}
@keyframes imgFloat{0%,100%{transform:translateY(0) rotate(0)}50%{transform:translateY(-7px) rotate(0.8deg)}}
.nt-word{font-family:var(--mono);font-size:28px;font-weight:700;letter-spacing:7px;text-transform:uppercase}
.nt-word .h{background:linear-gradient(90deg,var(--pink),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nt-word .s{background:linear-gradient(90deg,var(--cyan),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nt-sub{font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:5px;text-transform:uppercase}
.nt-clock{font-family:var(--mono);font-size:12px;color:var(--text-muted);letter-spacing:4px;animation:ntUp 0.5s var(--spring) 0.07s both}
.nt-sw{width:100%;max-width:500px;position:relative;animation:ntUp 0.5s var(--spring) 0.13s both}
.nt-search{
  width:100%;
  background:rgba(6,3,18,0.60);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  border:0.5px solid rgba(255,255,255,0.12);
  border-radius:var(--r-pill);
  color:var(--text);font-family:var(--mono);font-size:11px;
  padding:13px 48px 13px 20px;outline:none;
  transition:all 0.3s var(--out);
  box-shadow:var(--glass-shadow);
}
.nt-search:focus{
  background:rgba(232,121,200,0.06);
  border-color:rgba(232,121,200,0.40);
  box-shadow:0 0 0 4px rgba(232,121,200,0.08),var(--glow-pk);
}
.nt-search::placeholder{color:var(--text-muted)}
.nt-sicon{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none;transition:color 0.2s}
.nt-sw:focus-within .nt-sicon{color:var(--pink)}
.nt-sugs{
  position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:100;
  display:none;border-radius:var(--r-lg);overflow:hidden;
  background:rgba(6,3,18,0.90);
  backdrop-filter:blur(40px);
  border:0.5px solid rgba(232,121,200,0.18);
  box-shadow:var(--glass-shadow-lg),var(--glow-pk);
}
.nt-sugs.open{display:block;animation:ctxIn 0.20s var(--spring)}
.nt-si{
  display:flex;align-items:center;gap:10px;padding:10px 16px;
  cursor:pointer;font-family:var(--mono);font-size:9px;color:var(--text-muted);
  transition:all 0.12s;border-bottom:0.5px solid rgba(255,255,255,0.05);
}
.nt-si:last-child{border-bottom:none}
.nt-si:hover{background:var(--pink-dim);color:var(--text)}
.nt-si i{color:var(--text-muted);width:13px;text-align:center}

/* Tiles */
.nt-tiles{display:grid;grid-template-columns:repeat(4,116px);gap:8px;animation:ntUp 0.5s var(--spring) 0.19s both}
.nt-tile{
  border-radius:var(--r-lg);padding:16px 13px;cursor:pointer;
  display:flex;flex-direction:column;gap:10px;position:relative;overflow:hidden;
  background:rgba(6,3,18,0.55);
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:0.5px solid rgba(255,255,255,0.08);
  box-shadow:var(--glass-shadow);
  transition:all 0.26s var(--spring);
}
.nt-tile::before{
  content:'';position:absolute;top:0;left:0;right:0;height:0.5px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
}
.nt-tile:hover{transform:translateY(-6px) scale(1.04)}
.nt-tile.pk:hover{
  border-color:rgba(232,121,200,0.35);
  box-shadow:0 20px 48px rgba(232,121,200,0.15),var(--glass-shadow);
  background:rgba(232,121,200,0.07);
}
.nt-tile.cy:hover{
  border-color:rgba(34,212,245,0.35);
  box-shadow:0 20px 48px rgba(34,212,245,0.12),var(--glass-shadow);
  background:rgba(34,212,245,0.06);
}
.nt-tile:active{transform:translateY(-2px) scale(0.97)}
.tile-ico{font-size:20px;color:rgba(255,255,255,0.35);transition:all 0.26s var(--spring)}
.nt-tile.pk:hover .tile-ico{color:var(--pink);transform:scale(1.2) rotate(-7deg);filter:drop-shadow(0 0 6px var(--pink))}
.nt-tile.cy:hover .tile-ico{color:var(--cyan);transform:scale(1.2) rotate(7deg);filter:drop-shadow(0 0 6px var(--cyan))}
.tile-name{font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:2.5px;text-transform:uppercase}
.tile-desc{font-size:10px;color:rgba(200,190,230,0.35);line-height:1.4}

.nt-div{width:500px;height:0.5px;background:linear-gradient(90deg,transparent,rgba(232,121,200,0.15),rgba(34,212,245,0.12),transparent);animation:ntUp 0.5s var(--spring) 0.25s both}
.nt-sites{display:flex;gap:10px;animation:ntUp 0.5s var(--spring) 0.28s both;max-width:500px;flex-wrap:wrap;justify-content:center}
.nt-site{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform 0.25s var(--spring)}
.nt-site:hover{transform:translateY(-6px)}
.nt-sico{
  width:44px;height:44px;border-radius:var(--r-md);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;color:var(--text-muted);
  transition:all 0.25s var(--spring);
  background:rgba(6,3,18,0.55);
  border:0.5px solid rgba(255,255,255,0.08);
  backdrop-filter:blur(16px);
  box-shadow:var(--glass-shadow);
}
.nt-site:hover .nt-sico{
  background:var(--pink-dim);
  border-color:rgba(232,121,200,0.28);
  color:var(--pink);
  box-shadow:var(--glass-shadow-lg),var(--glow-pk);
  transform:scale(1.1);
}
.nt-slbl{font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:1.5px}
@keyframes ntUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}

/* ── Stub / internal ── */
.stub{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:100%;gap:12px;color:var(--text-muted);font-family:var(--mono)}
.stub-ico{font-size:30px;opacity:0.25;animation:ntUp 0.4s var(--spring)}
.stub-lbl{font-size:9px;letter-spacing:5px;text-transform:uppercase}
.stub-desc{font-size:9px;color:rgba(200,190,230,0.18)}
.ipage{padding:28px 36px;font-family:var(--mono);flex:1;animation:ntUp 0.32s var(--out)}
.ipage-h{font-size:9px;letter-spacing:3px;color:var(--text-muted);text-transform:uppercase;margin-bottom:18px}
.irow{
  display:flex;align-items:center;gap:12px;padding:10px 0;
  border-bottom:0.5px solid rgba(255,255,255,0.05);
  cursor:pointer;transition:all 0.15s var(--spring);
}
.irow:hover{padding-left:8px;color:var(--pink)}
.idanger{
  margin-top:20px;cursor:pointer;
  font-size:8px;color:#f87171;letter-spacing:2px;text-transform:uppercase;
  display:inline-block;transition:opacity 0.15s;
  font-family:var(--mono);
}
.idanger:hover{opacity:0.65}

/* ── Auth modal ── */
.modal-bg{
  position:fixed;inset:0;z-index:5000;
  display:none;align-items:center;justify-content:center;
  background:rgba(3,1,12,0.60);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
}
.modal-bg.open{display:flex;animation:mbIn 0.20s ease}
@keyframes mbIn{from{opacity:0}to{opacity:1}}
.modal{
  position:relative;width:380px;padding:32px;
  border-radius:var(--r-xl);
  background:rgba(8,4,24,0.88);
  backdrop-filter:blur(56px);-webkit-backdrop-filter:blur(56px);
  border:0.5px solid rgba(232,121,200,0.20);
  box-shadow:0 40px 100px rgba(0,0,0,0.7),var(--glow-pk);
  animation:modalIn 0.38s var(--spring);
}
@keyframes modalIn{from{opacity:0;transform:scale(0.80) translateY(30px)}to{opacity:1;transform:none}}
.modal h2{font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:4px;text-transform:uppercase;margin-bottom:4px}
.modal h2 .h{background:linear-gradient(90deg,var(--pink),#c084fc);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal h2 .s{background:linear-gradient(90deg,var(--cyan),#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.modal-sub{font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:2px;margin-bottom:24px}
.modal-x{
  position:absolute;top:14px;right:14px;background:none;border:none;
  color:var(--text-muted);cursor:pointer;font-size:13px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s var(--spring);
}
.modal-x:hover{background:var(--pink-dim);color:var(--pink);transform:scale(1.15) rotate(90deg)}
.mtabs{display:flex;gap:3px;margin-bottom:20px}
.mtab{
  flex:1;padding:8px;border-radius:var(--r-pill);
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.08);
  cursor:pointer;font-family:var(--mono);font-size:9px;color:var(--text-muted);
  letter-spacing:1px;text-transform:uppercase;
  transition:all 0.2s var(--spring);
}
.mtab:hover{background:rgba(255,255,255,0.08);color:var(--text-dim)}
.mtab.on{
  background:var(--pink-dim);
  border-color:rgba(232,121,200,0.35);
  color:var(--pink);
}
.mfield{margin-bottom:13px}
.mlabel{font-family:var(--mono);font-size:8px;color:var(--text-muted);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;display:block}
.minput{
  width:100%;
  background:rgba(255,255,255,0.05);
  border:0.5px solid rgba(255,255,255,0.10);
  border-radius:var(--r-md);
  color:var(--text);font-family:var(--mono);font-size:10px;
  padding:10px 14px;outline:none;
  transition:all 0.22s;
}
.minput:focus{
  border-color:rgba(232,121,200,0.45);
  background:rgba(232,121,200,0.06);
  box-shadow:0 0 0 3px rgba(232,121,200,0.08);
}
.minput::placeholder{color:var(--text-muted)}
.mbtn{
  width:100%;padding:12px;border:none;
  border-radius:var(--r-pill);
  background:linear-gradient(135deg,var(--pink),var(--cyan));
  color:#fff;font-family:var(--mono);font-size:10px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;
  cursor:pointer;transition:all 0.22s var(--spring);
  margin-top:6px;
  box-shadow:0 4px 20px var(--pink-glow);
}
.mbtn:hover{transform:translateY(-2px);box-shadow:0 8px 30px var(--pink-glow)}
.mbtn:active{transform:scale(0.97)}
.mbtn:disabled{opacity:0.35;cursor:default;transform:none}
.merr{font-family:var(--mono);font-size:9px;color:#f87171;letter-spacing:0.5px;margin-top:8px;min-height:14px}
.mdiv{height:0.5px;background:rgba(255,255,255,0.07);margin:20px 0}
.avrow{display:flex;align-items:center;gap:14px;margin-bottom:20px}
.avbig{
  width:48px;height:48px;border-radius:50%;
  background:linear-gradient(135deg,var(--pink),var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);font-size:17px;font-weight:700;color:#fff;flex-shrink:0;
  box-shadow:0 4px 18px var(--pink-glow);
}
.uname{font-size:15px;font-weight:500}.uemail{font-family:var(--mono);font-size:9px;color:var(--text-muted);margin-top:3px}
.sync-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:0.5px solid rgba(255,255,255,0.06);
  font-family:var(--mono);font-size:9px;color:var(--text-muted);
}
.sync-row:last-child{border-bottom:none}.sync-row span{color:var(--text-dim);font-size:10px}
.ss{font-size:8px;color:var(--cyan);letter-spacing:1px;text-transform:uppercase}
.ss.pend{color:var(--pink);animation:dotpulse 1s infinite}
.mbtn-sm{
  padding:7px 14px;width:auto;display:inline-block;margin-top:0;
  font-size:9px;border-radius:var(--r-pill);border:none;
  background:linear-gradient(135deg,var(--pink),var(--cyan));
  color:#fff;font-family:var(--mono);cursor:pointer;
  transition:all 0.2s var(--spring);
  box-shadow:0 2px 12px var(--pink-glow);
  text-transform:uppercase;letter-spacing:1px;
}
.mbtn-sm:hover{transform:translateY(-1px) scale(1.06);box-shadow:0 6px 20px var(--pink-glow)}
.mbtn-out{
  background:rgba(255,255,255,0.04);
  border:0.5px solid rgba(255,255,255,0.10);
  color:var(--text-muted);cursor:pointer;
  font-family:var(--mono);font-size:9px;letter-spacing:1px;text-transform:uppercase;
  padding:10px 16px;border-radius:var(--r-pill);
  transition:all 0.2s;display:block;width:100%;text-align:center;margin-top:12px;
}
.mbtn-out:hover{color:#f87171;border-color:rgba(248,113,113,0.30);background:rgba(248,113,113,0.05)}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(232,121,200,0.20);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(232,121,200,0.40)}
</style>
</head>
<body>

<!-- Background -->
<div class="bg"></div>
<div class="bg-overlay"></div>

<div class="browser" id="browser">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="logo-btn" onclick="nav(activeTabId,'hyperspeed://newtab')" title="Home">
      <img src="/favicon.png" alt="HS"/>
    </div>
    <button class="nav-btn active" id="btn-newtab" onclick="nav(activeTabId,'hyperspeed://newtab')"><i class="fa-solid fa-house"></i><span class="nav-tip">home</span></button>
    <button class="nav-btn" id="btn-games" onclick="nav(activeTabId,'hyperspeed://games')"><i class="fa-solid fa-gamepad"></i><span class="nav-tip">games</span></button>
    <button class="nav-btn" id="btn-movies" onclick="nav(activeTabId,'hyperspeed://movies')"><i class="fa-solid fa-film"></i><span class="nav-tip">movies</span></button>
    <button class="nav-btn" id="btn-ai" onclick="nav(activeTabId,'hyperspeed://ai')"><i class="fa-solid fa-robot"></i><span class="nav-tip">ai</span></button>
    <div class="sidebar-div"></div>
    <button class="nav-btn" id="btn-bm" onclick="toggleBmBar()"><i class="fa-solid fa-bookmark"></i><span class="nav-tip">bookmarks</span></button>
    <button class="nav-btn" id="btn-history" onclick="nav(activeTabId,'hyperspeed://history')"><i class="fa-solid fa-clock-rotate-left"></i><span class="nav-tip">history</span></button>
    <div class="sidebar-space"></div>
    <button class="nav-btn" id="btn-settings" onclick="nav(activeTabId,'hyperspeed://settings')"><i class="fa-solid fa-gear"></i><span class="nav-tip">settings</span></button>
    <button class="nav-btn" id="btn-about" onclick="nav(activeTabId,'hyperspeed://about')"><i class="fa-solid fa-circle-info"></i><span class="nav-tip">about</span></button>
    <div style="height:8px"></div>
    <button class="acct-btn guest" id="acct-btn" onclick="openModal()"><i class="fa-solid fa-user" id="acct-icon"></i><span class="nav-tip" id="acct-tip">sign in</span></button>
  </aside>

  <!-- Tab Bar -->
  <div class="tab-bar" id="tab-bar"></div>

  <!-- Chrome -->
  <header class="chrome">
    <button class="chr-btn" id="btn-back" onclick="goBack()" disabled><i class="fa-solid fa-chevron-left"></i></button>
    <button class="chr-btn" id="btn-fwd" onclick="goFwd()" disabled><i class="fa-solid fa-chevron-right"></i></button>
    <button class="chr-btn" onclick="reload()"><i class="fa-solid fa-rotate-right"></i></button>
    <button class="chr-btn" onclick="nav(activeTabId,'hyperspeed://newtab')"><i class="fa-solid fa-house"></i></button>
    <div class="url-wrap">
      <input class="url-bar" id="url-bar" type="text" placeholder="search or enter a url…" spellcheck="false" autocomplete="off" onkeydown="urlKey(event)" onfocus="this.select()"/>
      <i class="url-lock" id="url-lock"></i>
    </div>
    <button class="bm-star" id="bm-star" onclick="toggleBm()" title="Bookmark (Ctrl+D)"><i class="fa-solid fa-star"></i></button>
    <button class="chr-btn" onclick="toggleFind()" title="Find (Ctrl+F)"><i class="fa-solid fa-magnifying-glass"></i></button>
    <div class="pills">
      <div class="pill"><div class="dot spin" id="sw-dot"></div><span id="sw-lbl">init</span></div>
      <div class="pill load-pill" id="load-pill">--</div>
    </div>
  </header>

  <!-- Bookmarks bar -->
  <div class="bm-bar" id="bm-bar"></div>

  <!-- Viewport -->
  <main class="viewport" id="viewport">
    <div class="find-bar" id="find-bar">
      <input class="find-in" id="find-in" placeholder="find in page…" oninput="findInPage()" onkeydown="findKey(event)"/>
      <span class="find-ct" id="find-ct"></span>
      <button class="find-nav" onclick="findStep(-1)"><i class="fa-solid fa-chevron-up"></i></button>
      <button class="find-nav" onclick="findStep(1)"><i class="fa-solid fa-chevron-down"></i></button>
      <button class="chr-btn" onclick="closeFind()"><i class="fa-solid fa-xmark"></i></button>
    </div>
  </main>
</div>

<div class="ctx" id="ctx"></div>
<div class="toasts" id="toasts"></div>

<!-- Auth Modal -->
<div class="modal-bg" id="modal-bg">
  <div class="modal">
    <button class="modal-x" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
    <div id="p-guest">
      <h2><span class="h">HYPER</span><span class="s">SPEED</span></h2>
      <div class="modal-sub">sync bookmarks &nbsp;·&nbsp; history &nbsp;·&nbsp; everywhere</div>
      <div class="mtabs">
        <button class="mtab on" id="t-si" onclick="authTab('si')">sign in</button>
        <button class="mtab" id="t-reg" onclick="authTab('reg')">register</button>

        <div class="mfield"><label class="mlabel">password</label><input class="minput" id="si-pw" type="password" placeholder="••••••••" autocomplete="current-password"/></div>
        <button class="mbtn" id="si-btn" onclick="doSignIn()">sign in</button>
        <div class="merr" id="si-err"></div>
      </div>
      <div id="f-reg" style="display:none">
        <div class="mfield"><label class="mlabel">display name</label><input class="minput" id="reg-name" type="text" placeholder="your name" autocomplete="name"/></div>
        <div class="mfield"><label class="mlabel">email</label><input class="minput" id="reg-email" type="email" placeholder="you@example.com" autocomplete="email"/></div>
        <div class="mfield"><label class="mlabel">password</label><input class="minput" id="reg-pw" type="password" placeholder="min 6 characters" autocomplete="new-password"/></div>
        <button class="mbtn" id="reg-btn" onclick="doRegister()">create account</button>

    <div id="p-user" style="display:none">
      <div class="avrow"><div class="avbig" id="u-av">?</div><div><div class="uname" id="u-name">—</div><div class="uemail" id="u-email">—</div></div></div>
      <div class="mdiv"></div>
      <div class="sync-row"><span>Bookmarks</span><span class="ss" id="ss-bm">synced</span></div>
      <div class="sync-row"><span>History</span><span class="ss" id="ss-hi">synced</span></div>
      <div class="mdiv"></div>
      <div class="mfield"><label class="mlabel">change display name</label><div style="display:flex;gap:8px"><input class="minput" id="new-name" type="text" placeholder="new name" style="flex:1"/><button class="mbtn-sm" onclick="updateName()">save</button></div></div>
      <div class="mfield"><label class="mlabel">change password</label><div style="display:flex;gap:8px"><input class="minput" id="new-pw" type="password" placeholder="new password" style="flex:1"/><button class="mbtn-sm" onclick="updatePw()">save</button></div></div>
      <div class="merr" id="u-err"></div>
      <button class="mbtn-out" onclick="doSignOut()"><i class="fa-solid fa-arrow-right-from-bracket" style="margin-right:8px"></i>sign out</button>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import{getAnalytics}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-analytics.js";
import{getFirestore,collection,doc,setDoc,deleteDoc,getDocs,addDoc,query,orderBy,limit,writeBatch,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,onAuthStateChanged,signOut,updateProfile,updatePassword as fbUPw}from"https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
const cfg={apiKey:"AIzaSyB4OJcdcGsNAvfRvV3LvbSLzZA8W8e9amk",authDomain:"hyperspeed-69a64.firebaseapp.com",projectId:"hyperspeed-69a64",storageBucket:"hyperspeed-69a64.firebasestorage.app",messagingSenderId:"99441435910",appId:"1:99441435910:web:fa1232497c212c2bd36a87",measurementId:"G-6SSE45CTH5"};
const app=initializeApp(cfg);getAnalytics(app);
const db=getFirestore(app),auth=getAuth(app);
const bid=url=>btoa(unescape(encodeURIComponent(url))).replace(/[^a-zA-Z0-9]/g,'').slice(0,60);
window._db={
  async getBm(){const s=await getDocs(query(collection(db,'bookmarks'),orderBy('createdAt','asc')));return s.docs.map(d=>({id:d.id,...d.data()}))},
  async addBm(b){await setDoc(doc(db,'bookmarks',bid(b.url)),{url:b.url,title:b.title,favicon:b.favicon,createdAt:serverTimestamp()})},
  async delBm(url){await deleteDoc(doc(db,'bookmarks',bid(url)))},
  async addHist(e){await addDoc(collection(db,'history'),{url:e.url,title:e.title,visitedAt:serverTimestamp()})},
  async getHist(n=60){const s=await getDocs(query(collection(db,'history'),orderBy('visitedAt','desc'),limit(n)));return s.docs.map(d=>({id:d.id,...d.data()}))},
  async clearHist(){const s=await getDocs(collection(db,'history'));const b=writeBatch(db);s.docs.forEach(d=>b.delete(d.ref));await b.commit();}
};
window._dbReady=true;window.dispatchEvent(new Event('db-ready'));
window._auth=auth;
const fe=c=>({'auth/invalid-email':'invalid email','auth/user-not-found':'no account found','auth/wrong-password':'incorrect password','auth/invalid-credential':'incorrect email or password','auth/email-already-in-use':'email already in use','auth/weak-password':'password too weak (min 6)','auth/too-many-requests':'too many attempts — try later','auth/requires-recent-login':'sign out and back in first'}[c]||c);
onAuthStateChanged(auth,user=>{window._cu=user;if(window.updateAcctUI)window.updateAcctUI(user);});
window.doSignIn=async function(){
  const e=document.getElementById('si-email').value.trim(),p=document.getElementById('si-pw').value,btn=document.getElementById('si-btn'),err=document.getElementById('si-err');
  err.textContent='';btn.disabled=true;
  try{await signInWithEmailAndPassword(auth,e,p);closeModal();toast('Signed in','fa-solid fa-circle-user');}
  catch(x){err.textContent=fe(x.code);}finally{btn.disabled=false;}
};
window.doRegister=async function(){
  const n=document.getElementById('reg-name').value.trim(),e=document.getElementById('reg-email').value.trim(),p=document.getElementById('reg-pw').value,btn=document.getElementById('reg-btn'),err=document.getElementById('reg-err');
  err.textContent='';if(!n){err.textContent='display name required';return;}btn.disabled=true;
  try{const c=await createUserWithEmailAndPassword(auth,e,p);await updateProfile(c.user,{displayName:n});closeModal();toast('Welcome!','fa-solid fa-star');}
  catch(x){err.textContent=fe(x.code);}finally{btn.disabled=false;}
};
window.doSignOut=async function(){await signOut(auth);closeModal();toast('Signed out','fa-solid fa-arrow-right-from-bracket');};
window.updateName=async function(){
  const n=document.getElementById('new-name').value.trim(),err=document.getElementById('u-err');err.textContent='';if(!n)return;
  try{await updateProfile(auth.currentUser,{displayName:n});window.updateAcctUI(auth.currentUser);document.getElementById('new-name').value='';toast('Name updated','fa-solid fa-user');}
  catch(x){err.textContent=fe(x.code);}
};
window.updatePw=async function(){
  const p=document.getElementById('new-pw').value,err=document.getElementById('u-err');err.textContent='';
  if(p.length<6){err.textContent='min 6 characters';return;}
  try{await fbUPw(auth.currentUser,p);document.getElementById('new-pw').value='';toast('Password updated','fa-solid fa-lock');}
  catch(x){err.textContent=fe(x.code);}
};
</script>

<script>
let tabs={},activeTabId=null,tabCounter=0,clockInterval=null,_ns=null,_tt=null;
let bookmarks=[],histList=[],bmBarVisible=false,dragSrc=null,findMatches=[],findIdx=0,_prevPane=null;

window.addEventListener('db-ready',async()=>{
  try{bookmarks=await window._db.getBm();updateBmStar(tabs[activeTabId]?.url||'');renderBmBar();}catch(e){}
  try{histList=await window._db.getHist(100);}catch(e){}
});

const gid=()=>'t'+(++tabCounter);
const isUrl=s=>/^https?:\/\//i.test(s)||/^[\w-]+\.[a-z]{2,}/i.test(s);
const shortUrl=url=>{try{return new URL(url).hostname.replace('www.','');}catch{return url.slice(0,28);}};
const picon=p=>({newtab:'fa-solid fa-house',games:'fa-solid fa-gamepad',movies:'fa-solid fa-film',ai:'fa-solid fa-robot',settings:'fa-solid fa-gear',about:'fa-solid fa-circle-info',history:'fa-solid fa-clock-rotate-left'}[p]||'fa-solid fa-house');

function toast(msg,icon='fa-solid fa-circle-check'){
  const w=document.getElementById('toasts'),el=document.createElement('div');
  el.className='toast';el.innerHTML=`<i class="${icon}"></i> ${msg}`;w.appendChild(el);
  setTimeout(()=>{el.classList.add('out');setTimeout(()=>el.remove(),260);},2500);
}

function newTab(url='hyperspeed://newtab'){
  const id=gid();
  tabs[id]={id,url,hist:[url],hi:0,title:'new tab',favicon:'fa-solid fa-house',pinned:false,muted:false};
  const pane=document.createElement('div');pane.className='tab-pane';pane.id='p-'+id;
  document.getElementById('viewport').appendChild(pane);
  renderTabs(id);switchTab(id);updateWidths();return id;
}

function closeTab(id,e){
  if(e){e.stopPropagation();e.preventDefault();}
  const ids=getOrder();if(ids.length===1)newTab();
  if(activeTabId===id){const i=ids.indexOf(id);const nx=ids[i+1]||ids[i-1];if(nx&&nx!==id)switchTab(nx);}
  const el=document.querySelector(`.tab[data-id="${id}"]`);
  const rm=()=>{document.getElementById('p-'+id)?.remove();delete tabs[id];renderTabs();updateWidths();};
  if(el){el.classList.add('tab-exit');setTimeout(rm,220);}else rm();
}

const getOrder=()=>[...document.querySelectorAll('.tab')].map(t=>t.dataset.id).filter(Boolean);

function switchTab(id){
  if(!tabs[id])return;
  if(_prevPane&&_prevPane!==id){
    const pp=document.getElementById('p-'+_prevPane);
    if(pp&&pp.classList.contains('active')){pp.classList.add('p-exit');setTimeout(()=>pp.classList.remove('active','p-exit'),230);}
  }
  const pane=document.getElementById('p-'+id);
  if(pane){
    pane.classList.add('active','p-enter');
    setTimeout(()=>pane.classList.remove('p-enter'),320);
    if(!pane.hasChildNodes()){const t=tabs[id];t.url.startsWith('hyperspeed://')?renderPane(id,t.url.replace('hyperspeed://','')): renderWeb(id,t.url);}
  }
  _prevPane=id;activeTabId=id;renderTabs();
  const t=tabs[id];document.getElementById('url-bar').value=t.url;
  updateNavBtns();updateSideActive(t.url);updateLock(t.url);updateBmStar(t.url);closeFind();
}

function renderTabs(newId){
  const bar=document.getElementById('tab-bar');bar.innerHTML='';
  const pinned=Object.values(tabs).filter(t=>t.pinned);
  const normal=Object.values(tabs).filter(t=>!t.pinned);
  [...pinned,...normal].forEach(tab=>{
    const el=document.createElement('div');
    el.className='tab'+(tab.id===activeTabId?' active':'')+(tab.muted?' muted':'');
    if(tab.id===newId)el.classList.add('tab-enter');
    el.dataset.id=tab.id;el.draggable=true;
    if(tab.pinned)el.style.cssText+='width:40px;min-width:40px;padding:0 8px;';
    el.innerHTML=`<span class="tab-spin"></span><span class="tab-fav"><i class="${tab.favicon}"></i></span>${tab.pinned?'':`<span class="tab-title">${tab.title}</span>`}${!tab.pinned?`<span class="tab-mute" onclick="muteTab('${tab.id}');event.stopPropagation()"><i class="fa-solid ${tab.muted?'fa-volume-xmark':'fa-volume-low'}"></i></span>`:''} ${!tab.pinned?`<span class="tab-close" onclick="closeTab('${tab.id}',event)"><i class="fa-solid fa-xmark"></i></span>`:''}`;
    el.addEventListener('click',()=>switchTab(tab.id));
    el.addEventListener('contextmenu',e=>tabCtx(e,tab.id));
    el.addEventListener('dragstart',e=>{dragSrc=tab.id;el.classList.add('dragging');e.dataTransfer.effectAllowed='move';});
    el.addEventListener('dragend',()=>el.classList.remove('dragging'));
    el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-over');});
    el.addEventListener('dragleave',()=>el.classList.remove('drag-over'));
    el.addEventListener('drop',e=>{e.preventDefault();el.classList.remove('drag-over');if(dragSrc!==tab.id){const s=bar.querySelector(`.tab[data-id="${dragSrc}"]`);if(s)bar.insertBefore(s,el);toast('Tab moved','fa-solid fa-arrows-left-right');}});
    bar.appendChild(el);
  });
  const plus=document.createElement('div');plus.className='tab-new';plus.title='New tab (Ctrl+T)';
  plus.innerHTML='<i class="fa-solid fa-plus"></i>';plus.onclick=()=>newTab();bar.appendChild(plus);
}

function updateWidths(){const bar=document.getElementById('tab-bar');const c=Object.values(tabs).filter(t=>!t.pinned).length;bar.classList.remove('compact','very-compact');if(c>8)bar.classList.add('very-compact');else if(c>5)bar.classList.add('compact');}
function pinTab(id){if(!tabs[id])return;tabs[id].pinned=!tabs[id].pinned;renderTabs();toast(tabs[id].pinned?'Tab pinned':'Tab unpinned','fa-solid fa-thumbtack');}
function muteTab(id){if(tabs[id]){tabs[id].muted=!tabs[id].muted;renderTabs();}}
function dupTab(id){const s=tabs[id];if(s){newTab(s.url);toast('Duplicated','fa-solid fa-clone');}}
function closeOthers(k){Object.keys(tabs).forEach(id=>{if(id!==k)closeTab(id);});}

function tabCtx(e,id){
  e.preventDefault();const tab=tabs[id];if(!tab)return;
  const m=document.getElementById('ctx');
  m.innerHTML=`<div class="ctx-row" onclick="dupTab('${id}');closeCtx()"><i class="fa-solid fa-clone"></i> Duplicate</div><div class="ctx-row" onclick="pinTab('${id}');closeCtx()"><i class="fa-solid fa-thumbtack"></i> ${tab.pinned?'Unpin':'Pin'}</div><div class="ctx-row" onclick="muteTab('${id}');closeCtx()"><i class="fa-solid fa-volume-xmark"></i> ${tab.muted?'Unmute':'Mute'}</div><div class="ctx-sep"></div><div class="ctx-row" onclick="newTab();closeCtx()"><i class="fa-solid fa-plus"></i> New tab</div><div class="ctx-row" onclick="closeOthers('${id}');closeCtx()"><i class="fa-solid fa-layer-group"></i> Close others</div><div class="ctx-row red" onclick="closeTab('${id}');closeCtx()"><i class="fa-solid fa-xmark"></i> Close</div>`;
  m.style.left=Math.min(e.clientX,window.innerWidth-200)+'px';m.style.top=Math.min(e.clientY,window.innerHeight-230)+'px';m.classList.add('open');
}
function closeCtx(){document.getElementById('ctx').classList.remove('open');}
document.addEventListener('click',()=>closeCtx());

document.addEventListener('keydown',e=>{
  const m=e.ctrlKey||e.metaKey;
  if(e.key==='Escape'){closeCtx();closeFind();closeModal();}
  if(m&&e.key==='t'){e.preventDefault();newTab();}
  if(m&&e.key==='w'){e.preventDefault();closeTab(activeTabId);}
  if(m&&e.key==='f'){e.preventDefault();toggleFind();}
  if(m&&e.key==='l'){e.preventDefault();document.getElementById('url-bar').focus();}
  if(m&&e.key==='d'){e.preventDefault();toggleBm();}
  if(m&&e.key==='r'){e.preventDefault();reload();}
  if(m&&e.key>='1'&&e.key<='9'){const ids=getOrder();const id=ids[parseInt(e.key)-1];if(id){switchTab(id);e.preventDefault();}}
});

function nav(id,url,push=true){
  if(!id||!tabs[id])id=activeTabId;if(!url)return;
  if(!url.includes('://')&&!url.startsWith('/'))url=isUrl(url)?(url.startsWith('http')?url:'https://'+url):'https://www.bing.com/search?q='+encodeURIComponent(url);
  const tab=tabs[id];
  if(push){tab.hist=tab.hist.slice(0,tab.hi+1);tab.hist.push(url);tab.hi=tab.hist.length-1;}
  tab.url=url;
  if(url.startsWith('hyperspeed://')){const pg=url.replace('hyperspeed://','');tab.title=pg;tab.favicon=picon(pg);renderPane(id,pg);}
  else{tab.title=shortUrl(url);tab.favicon='fa-solid fa-globe';renderWeb(id,url);addHist(url);}
  if(id===activeTabId){document.getElementById('url-bar').value=url;updateNavBtns();updateSideActive(url);updateLock(url);updateBmStar(url);}
  renderTabs();
}
function urlKey(e){if(e.key==='Enter')nav(activeTabId,e.target.value.trim());}
function goBack(){const t=tabs[activeTabId];if(t&&t.hi>0){t.hi--;nav(activeTabId,t.hist[t.hi],false);}}
function goFwd(){const t=tabs[activeTabId];if(t&&t.hi<t.hist.length-1){t.hi++;nav(activeTabId,t.hist[t.hi],false);}}
function reload(){const t=tabs[activeTabId];if(t)nav(activeTabId,t.url,false);}
function updateNavBtns(){const t=tabs[activeTabId];document.getElementById('btn-back').disabled=!t||t.hi<=0;document.getElementById('btn-fwd').disabled=!t||t.hi>=t.hist.length-1;}
function updateSideActive(url){document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));if(url.startsWith('hyperspeed://')){const b=document.getElementById('btn-'+url.replace('hyperspeed://',''));if(b)b.classList.add('active');}}
function updateLock(url){const i=document.getElementById('url-lock');if(url.startsWith('https://'))i.className='url-lock secure fa-solid fa-lock';else if(url.startsWith('http://'))i.className='url-lock fa-solid fa-lock-open';else i.className='';}

function timerStart(){
  _ns=performance.now();if(_tt)clearInterval(_tt);
  const p=document.getElementById('load-pill');p.className='pill load-pill loading';
  document.querySelector(`.tab[data-id="${activeTabId}"]`)?.classList.add('loading');
  _tt=setInterval(()=>{const ms=performance.now()-_ns;p.textContent=ms<1000?Math.round(ms)+'ms':(ms/1000).toFixed(2)+'s';},50);
}
function timerStop(){
  if(!_ns)return;if(_tt){clearInterval(_tt);_tt=null;}
  const ms=performance.now()-_ns;const p=document.getElementById('load-pill');
  p.textContent=ms<1000?Math.round(ms)+'ms':(ms/1000).toFixed(2)+'s';p.className='pill load-pill done';
  _ns=null;document.querySelectorAll('.tab.loading').forEach(t=>t.classList.remove('loading'));
}

async function renderPane(id,pg){
  const pane=document.getElementById('p-'+id);if(!pane)return;pane.innerHTML='';
  if(pg==='newtab'){const v=document.createElement('div');v.className='iv';v.innerHTML=buildNT();pane.appendChild(v);setupNT(v);timerStart();setTimeout(timerStop,80);}
  else if(pg==='history'){const v=document.createElement('div');v.className='iv';v.innerHTML=await buildHistPage();pane.appendChild(v);timerStart();setTimeout(timerStop,60);}
  else{const f=document.createElement('iframe');f.style.cssText='width:100%;height:100%;border:none;background:transparent;';f.src='/pages/'+pg+'.html';timerStart();f.onload=()=>timerStop();pane.appendChild(f);}
}
function renderWeb(id,url){
  const pane=document.getElementById('p-'+id);if(!pane)return;pane.innerHTML='';
  const f=document.createElement('iframe');f.sandbox='allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-top-navigation';
  const enc=(typeof __hyperspeed$config!=='undefined')?__hyperspeed$config.encodeUrl(url):encodeURIComponent(btoa(url));
  f.src='/hypertunnel/'+enc;timerStart();f.onload=()=>timerStop();pane.appendChild(f);
}

function updateBmStar(url){document.getElementById('bm-star').classList.toggle('saved',bookmarks.some(b=>b.url===url));}
async function toggleBm(){
  const t=tabs[activeTabId];if(!t)return;const url=t.url;
  if(bookmarks.some(b=>b.url===url)){bookmarks=bookmarks.filter(b=>b.url!==url);if(window._dbReady)try{await window._db.delBm(url);}catch(e){}toast('Bookmark removed','fa-regular fa-star');}
  else{const bm={url,title:t.title,favicon:t.favicon};bookmarks.push(bm);if(window._dbReady)try{await window._db.addBm(bm);}catch(e){}toast('Bookmark saved','fa-solid fa-star');}
  updateBmStar(url);renderBmBar();
}
function toggleBmBar(){bmBarVisible=!bmBarVisible;document.getElementById('browser').classList.toggle('bm-open',bmBarVisible);document.getElementById('btn-bm').classList.toggle('active',bmBarVisible);renderBmBar();}
function renderBmBar(){const bar=document.getElementById('bm-bar');if(!bmBarVisible){bar.innerHTML='';return;}bar.innerHTML=bookmarks.length?bookmarks.map(b=>`<div class="bm-chip" onclick="nav(activeTabId,'${b.url}')"><i class="${b.favicon}"></i> ${b.title}</div>`).join(''):'<span class="bm-empty">no bookmarks — press ★ to add</span>';}

async function addHist(url){const e={url,title:shortUrl(url),time:Date.now()};histList.unshift(e);if(histList.length>100)histList=histList.slice(0,100);if(window._dbReady)try{await window._db.addHist(e);}catch(e){}}
async function buildHistPage(){
  if(window._dbReady)try{histList=await window._db.getHist(60);}catch(e){}
  const items=histList.slice(0,60);
  if(!items.length)return`<div class="stub"><div class="stub-ico"><i class="fa-solid fa-clock-rotate-left"></i></div><div class="stub-lbl">history</div><div class="stub-desc">no history yet</div></div>`;
  return`<div class="ipage"><div class="ipage-h">browsing history</div>${items.map(h=>{const ts=h.visitedAt?.seconds?new Date(h.visitedAt.seconds*1000):new Date(h.time||0);return`<div class="irow" onclick="nav(activeTabId,'${h.url}')"><i class="fa-solid fa-globe" style="color:rgba(232,121,200,0.25);font-size:11px;flex-shrink:0"></i><span style="font-size:10px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:rgba(220,210,245,0.65);font-family:var(--mono)">${h.url}</span><span style="font-size:8px;color:rgba(200,190,230,0.25);flex-shrink:0;font-family:var(--mono)">${ts.toLocaleString()}</span></div>`;}).join('')}<div class="idanger" onclick="clearHist()">✕ clear history</div></div>`;
}
async function clearHist(){histList=[];if(window._dbReady)try{await window._db.clearHist();}catch(e){}nav(activeTabId,'hyperspeed://history',false);toast('History cleared','fa-solid fa-trash');}

function toggleFind(){const bar=document.getElementById('find-bar');const opening=!bar.classList.contains('open');bar.classList.toggle('open');if(opening){document.getElementById('find-in').focus();findInPage();}else clearHL();}
function closeFind(){document.getElementById('find-bar').classList.remove('open');document.getElementById('find-ct').textContent='';clearHL();}
function findKey(e){if(e.key==='Enter')e.shiftKey?findStep(-1):findStep(1);if(e.key==='Escape')closeFind();}
function getIframeDoc(){const pane=document.getElementById('p-'+activeTabId);if(!pane)return null;const f=pane.querySelector('iframe');if(!f)return null;try{return f.contentDocument||f.contentWindow?.document;}catch(e){return null;}}
function clearHL(){findMatches=[];findIdx=0;const d=getIframeDoc();if(!d)return;try{d.querySelectorAll('.__hl').forEach(el=>el.parentNode.replaceChild(d.createTextNode(el.textContent),el));}catch(e){}}
function findInPage(){
  const q=document.getElementById('find-in').value,ct=document.getElementById('find-ct');
  clearHL();if(!q){ct.textContent='';return;}
  const d=getIframeDoc();if(!d){ct.textContent='--';return;}
  try{
    const lq=q.toLowerCase();
    const wk=d.createTreeWalker(d.body,NodeFilter.SHOW_TEXT,{acceptNode(n){const p=n.parentNode;if(!p||['SCRIPT','STYLE','NOSCRIPT','TEXTAREA'].includes(p.nodeName))return NodeFilter.FILTER_REJECT;if(p.classList?.contains('__hl'))return NodeFilter.FILTER_REJECT;return n.textContent.toLowerCase().includes(lq)?NodeFilter.FILTER_ACCEPT:NodeFilter.FILTER_SKIP;}});
    const nodes=[];let n;while((n=wk.nextNode()))nodes.push(n);findMatches=[];
    nodes.forEach(tn=>{
      const tx=tn.textContent,lt=tx.toLowerCase();const fr=d.createDocumentFragment();let last=0,idx;
      while((idx=lt.indexOf(lq,last))!==-1){if(idx>last)fr.appendChild(d.createTextNode(tx.slice(last,idx)));const sp=d.createElement('span');sp.className='__hl';sp.style.cssText='background:rgba(232,121,200,0.75)!important;color:#fff!important;border-radius:3px;padding:0 2px;';fr.appendChild(sp);findMatches.push(sp);last=idx+q.length;}
      if(last<tx.length)fr.appendChild(d.createTextNode(tx.slice(last)));tn.parentNode.replaceChild(fr,tn);
    });
    if(!findMatches.length){ct.textContent='0 results';return;}
    findIdx=0;hlCur();ct.textContent=`1 / ${findMatches.length}`;
  }catch(e){ct.textContent='n/a';toast('Cannot search cross-origin pages','fa-solid fa-lock');}
}
function hlCur(){if(!findMatches.length)return;findMatches.forEach(m=>{m.style.background='rgba(232,121,200,0.75)';m.style.color='#fff';});const c=findMatches[findIdx];c.style.background='rgba(245,200,66,0.85)';c.style.color='#0a0514';c.scrollIntoView({behavior:'smooth',block:'center'});}
function findStep(dir){if(!findMatches.length){findInPage();return;}findIdx=(findIdx+dir+findMatches.length)%findMatches.length;hlCur();document.getElementById('find-ct').textContent=`${findIdx+1} / ${findMatches.length}`;}

function buildNT(){
  const sites=[['fa-brands fa-wikipedia-w','wikipedia.org','Wiki'],['fa-brands fa-reddit','reddit.com','Reddit'],['fa-brands fa-x-twitter','x.com','X'],['fa-brands fa-github','github.com','GitHub'],['fa-solid fa-newspaper','news.ycombinator.com','HN'],['fa-brands fa-spotify','open.spotify.com','Spotify']];
  return`<div class="newtab"><div class="nt-logo"><div class="nt-emblem"><img src="/favicon.png" alt="Hyperspeed"/></div><div class="nt-word"><span class="h">HYPER</span><span class="s">SPEED</span></div><div class="nt-sub">private &nbsp;·&nbsp; fast &nbsp;·&nbsp; unrestricted</div></div><div class="nt-clock" id="nt-clock"></div><div class="nt-sw"><input class="nt-search" id="nt-srch" placeholder="search or enter a url…" spellcheck="false" autocomplete="off"/><div class="nt-sicon"><i class="fa-solid fa-magnifying-glass"></i></div><div class="nt-sugs" id="nt-sugs"></div></div><div class="nt-tiles"><div class="nt-tile pk" onclick="nav(activeTabId,'hyperspeed://games')"><div class="tile-ico"><i class="fa-solid fa-gamepad"></i></div><div class="tile-name">games</div><div class="tile-desc">Play unblocked</div></div><div class="nt-tile cy" onclick="nav(activeTabId,'hyperspeed://movies')"><div class="tile-ico"><i class="fa-solid fa-film"></i></div><div class="tile-name">movies</div><div class="tile-desc">Stream free</div></div><div class="nt-tile pk" onclick="nav(activeTabId,'hyperspeed://ai')"><div class="tile-ico"><i class="fa-solid fa-robot"></i></div><div class="tile-name">ai</div><div class="tile-desc">Ask anything</div></div><div class="nt-tile cy" onclick="nav(activeTabId,'hyperspeed://settings')"><div class="tile-ico"><i class="fa-solid fa-gear"></i></div><div class="tile-name">settings</div><div class="tile-desc">Configure</div></div></div><div class="nt-div"></div><div class="nt-sites">${sites.map(([ic,url,label])=>`<div class="nt-site" onclick="nav(activeTabId,'https://${url}')"><div class="nt-sico"><i class="${ic}"></i></div><div class="nt-slbl">${label}</div></div>`).join('')}</div></div>`;
}
const SUGS=[{icon:'fa-solid fa-gamepad',label:'hyperspeed://games',hint:'Games'},{icon:'fa-solid fa-robot',label:'hyperspeed://ai',hint:'AI'},{icon:'fa-brands fa-google',label:'google.com',hint:'Google'},{icon:'fa-brands fa-youtube',label:'youtube.com',hint:'YouTube'},{icon:'fa-brands fa-github',label:'github.com',hint:'GitHub'}];
function setupNT(view){
  const s=view.querySelector('#nt-srch'),sg=view.querySelector('#nt-sugs');
  if(s){
    s.addEventListener('keydown',e=>{if(e.key==='Enter'){sg.classList.remove('open');nav(activeTabId,e.target.value.trim());}});
    s.addEventListener('input',()=>{const v=s.value.trim().toLowerCase();if(!v){sg.classList.remove('open');return;}const m=SUGS.filter(x=>x.label.includes(v)||x.hint.toLowerCase().includes(v));if(!m.length){sg.classList.remove('open');return;}sg.innerHTML=m.map(x=>`<div class="nt-si" onclick="nav(activeTabId,'${x.label}')"><i class="${x.icon}"></i><span>${x.label}</span><span style="margin-left:auto;font-size:8px;color:rgba(200,190,230,0.3);font-family:var(--mono)">${x.hint}</span></div>`).join('');sg.classList.add('open');});
    s.addEventListener('blur',()=>setTimeout(()=>sg.classList.remove('open'),150));
  }
  if(clockInterval)clearInterval(clockInterval);tick();clockInterval=setInterval(tick,1000);
}
function tick(){const el=document.getElementById('nt-clock');if(!el)return;const now=new Date(),pad=n=>String(n).padStart(2,'0');const days=['SUN','MON','TUE','WED','THU','FRI','SAT'];el.textContent=`${days[now.getDay()]}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;}

window.updateAcctUI=function(user){
  const btn=document.getElementById('acct-btn'),icon=document.getElementById('acct-icon'),tip=document.getElementById('acct-tip');
  if(user){
    const name=user.displayName||user.email||'?';
    const init=name.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    btn.classList.remove('guest');icon.style.display='none';
    let sp=btn.querySelector('.ini');if(!sp){sp=document.createElement('span');sp.className='ini';sp.style.cssText='font-size:10px;font-weight:700;font-family:var(--mono);color:#fff;pointer-events:none';btn.appendChild(sp);}
    sp.textContent=init;tip.textContent=name;
    document.getElementById('u-name').textContent=user.displayName||'no display name';
    document.getElementById('u-email').textContent=user.email;
    document.getElementById('u-av').textContent=init;
  }else{
    btn.classList.add('guest');icon.style.display='';tip.textContent='sign in';btn.querySelector('.ini')?.remove();
  }
};
function openModal(){
  document.getElementById('modal-bg').classList.add('open');
  const li=!!window._cu;
  document.getElementById('p-guest').style.display=li?'none':'block';
  document.getElementById('p-user').style.display=li?'block':'none';
  if(!li)authTab('si');
}
function closeModal(){document.getElementById('modal-bg').classList.remove('open');}
document.getElementById('modal-bg').addEventListener('click',e=>{if(e.target===document.getElementById('modal-bg'))closeModal();});
function authTab(w){
  document.getElementById('t-si').classList.toggle('on',w==='si');
  document.getElementById('t-reg').classList.toggle('on',w==='reg');
  document.getElementById('f-si').style.display=w==='si'?'block':'none';
  document.getElementById('f-reg').style.display=w==='reg'?'block':'none';
}
['si-email','si-pw'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doSignIn();}));
['reg-name','reg-email','reg-pw'].forEach(id=>document.getElementById(id)?.addEventListener('keydown',e=>{if(e.key==='Enter')doRegister();}));

async function registerSW(){
  const dot=document.getElementById('sw-dot'),lbl=document.getElementById('sw-lbl');
  const set=(cls,txt)=>{dot.className='dot '+cls;lbl.textContent=txt;};
  if(!('serviceWorker' in navigator)){set('err','unsupported');return;}set('spin','init');
  try{
    const reg=await navigator.serviceWorker.register('/sw.js',{scope:'/',updateViaCache:'none'});
    if(reg.waiting)reg.waiting.postMessage({type:'skip'});await navigator.serviceWorker.ready;
    if(!navigator.serviceWorker.controller){navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload(),{once:true});return;}
    for(let i=0;i<25;i++){try{const r=await fetch('/sw-check',{cache:'no-store'});if(r.ok&&(await r.json()).ok){set('ok','ready');return;}}catch{}await new Promise(r=>setTimeout(r,200));}
    set('err','error');
  }catch{set('err','failed');}
}
newTab('hyperspeed://newtab');
registerSW();
const _s=document.createElement('script');_s.src='/hyperspeed/hyperspeed.config.js';document.head.appendChild(_s);
</script>
