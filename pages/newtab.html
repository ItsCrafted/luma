<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New Tab</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --surface:#13131a;
  --surface2:#1a1a24;
  --surface3:#20202d;
  --border:rgba(255,255,255,0.07);
  --border-hi:rgba(255,255,255,0.13);
  --text:#e8e8f0;
  --muted:#5a5a70;
  --muted2:#2a2a38;
  --pink:#d856bf;
  --cyan:#03b3c3;
  --pink-glow:rgba(216,86,191,0.4);
  --cyan-glow:rgba(3,179,195,0.4);
  --mono:'IBM Plex Mono',monospace;
  --sans:'Plus Jakarta Sans',sans-serif;
  --radius-sm:10px;
  --radius-md:14px;
  --radius-lg:20px;
  --radius-xl:28px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden}

/* ─── Ambient blobs ─── */
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:0.07;animation:blobdrift 18s ease-in-out infinite}
.blob.p{width:500px;height:500px;background:var(--pink);top:-120px;left:-80px;animation-delay:0s}
.blob.c{width:600px;height:600px;background:var(--cyan);bottom:-180px;right:-120px;animation-delay:7s}
.blob.p2{width:300px;height:300px;background:var(--pink);top:50%;left:55%;animation-delay:3.5s;opacity:0.04}
@keyframes blobdrift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-25px) scale(1.06)}66%{transform:translate(-25px,35px) scale(0.96)}}

/* ─── Layout ─── */
.newtab{
  position:relative;z-index:1;height:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px;gap:26px;overflow-y:auto;
}

/* ─── Logo / emblem ─── */
.nt-logo{display:flex;flex-direction:column;align-items:center;gap:14px;animation:floatUp 0.55s ease both}
.nt-emblem{
  width:80px;height:80px;border-radius:50%;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.nt-emblem::before{
  content:'';position:absolute;inset:-10px;border-radius:50%;
  border:1px solid rgba(216,86,191,0.18);
  animation:ringpulse 3.5s ease-in-out infinite;
}
.nt-emblem::after{
  content:'';position:absolute;inset:-20px;border-radius:50%;
  border:1px solid rgba(3,179,195,0.1);
  animation:ringpulse 3.5s ease-in-out infinite;animation-delay:1.2s;
}
@keyframes ringpulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.06);opacity:0.4}}
.nt-emblem-img{
  width:80px;height:80px;border-radius:50%;
  object-fit:contain;
  filter:drop-shadow(0 0 18px var(--pink-glow)) drop-shadow(0 0 36px rgba(216,86,191,0.12));
  animation:coreglow 3s ease-in-out infinite;
}
@keyframes coreglow{0%,100%{filter:drop-shadow(0 0 18px var(--pink-glow)) drop-shadow(0 0 36px rgba(216,86,191,0.12))}50%{filter:drop-shadow(0 0 22px var(--cyan-glow)) drop-shadow(0 0 44px rgba(3,179,195,0.12))}}

.nt-wordmark{
  font-family:var(--mono);font-size:30px;font-weight:500;
  letter-spacing:5px;line-height:1;
}
.nt-wordmark .h{color:var(--pink)}
.nt-wordmark .s{color:var(--cyan)}
.nt-sub{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:4px;text-transform:uppercase}

/* ─── Clock ─── */
.nt-clock{
  font-family:var(--mono);font-size:12px;color:var(--muted);
  letter-spacing:3px;animation:floatUp 0.55s 0.07s ease both;
}

/* ─── Search ─── */
.nt-search-wrap{
  width:100%;max-width:500px;
  animation:floatUp 0.55s 0.14s ease both;
  position:relative;
}
.nt-search{
  width:100%;background:var(--surface);
  border:1px solid var(--border-hi);
  border-radius:var(--radius-xl);
  color:var(--text);font-family:var(--mono);font-size:12px;
  padding:13px 46px 13px 22px;outline:none;
  transition:all 0.25s;
}
.nt-search:focus{
  border-color:rgba(216,86,191,0.5);
  box-shadow:0 0 0 5px rgba(216,86,191,0.06),0 0 32px rgba(216,86,191,0.08);
  background:var(--surface2);
}
.nt-search::placeholder{color:var(--muted)}
.nt-search-icon{
  position:absolute;right:16px;top:50%;transform:translateY(-50%);
  color:var(--muted);pointer-events:none;font-size:13px;
  transition:color 0.2s;
}
.nt-search-wrap:focus-within .nt-search-icon{color:var(--pink)}

/* Suggestions */
.nt-suggestions{
  position:absolute;top:calc(100% + 8px);left:0;right:0;z-index:100;
  background:var(--surface2);border:1px solid var(--border-hi);
  border-radius:var(--radius-md);overflow:hidden;
  display:none;
  box-shadow:0 16px 40px rgba(0,0,0,0.5);
}
.nt-suggestions.open{display:block}
.nt-sug-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 16px;cursor:pointer;
  font-family:var(--mono);font-size:10px;color:var(--text);
  transition:background 0.12s;
  border-bottom:1px solid var(--border);
}
.nt-sug-item:last-child{border-bottom:none}
.nt-sug-item:hover{background:var(--surface3)}
.nt-sug-item i{color:var(--muted);width:14px;text-align:center;flex-shrink:0}
.nt-sug-hint{margin-left:auto;font-size:9px;color:var(--muted)}

/* ─── Tiles ─── */
.nt-tiles{
  display:grid;grid-template-columns:repeat(4,120px);
  gap:8px;animation:floatUp 0.55s 0.21s ease both;
}
.nt-tile{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:16px 14px;cursor:pointer;transition:all 0.25s;
  display:flex;flex-direction:column;gap:9px;
  position:relative;overflow:hidden;
}
.nt-tile::before{
  content:'';position:absolute;top:-40%;left:-20%;
  width:80%;height:80%;border-radius:50%;
  opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.nt-tile.pk::before{background:radial-gradient(circle,rgba(216,86,191,0.2),transparent 70%)}
.nt-tile.cy::before{background:radial-gradient(circle,rgba(3,179,195,0.2),transparent 70%)}
.nt-tile:hover{transform:translateY(-3px)}
.nt-tile:hover::before{opacity:1}
.nt-tile.pk:hover{border-color:rgba(216,86,191,0.35);box-shadow:0 10px 30px rgba(0,0,0,0.45),0 0 28px rgba(216,86,191,0.08)}
.nt-tile.cy:hover{border-color:rgba(3,179,195,0.35);box-shadow:0 10px 30px rgba(0,0,0,0.45),0 0 28px rgba(3,179,195,0.08)}
.tile-icon{font-size:20px;color:var(--muted);transition:all 0.25s;position:relative;z-index:1}
.nt-tile.pk:hover .tile-icon{color:var(--pink)}
.nt-tile.cy:hover .tile-icon{color:var(--cyan)}
.tile-name{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;position:relative;z-index:1}
.tile-desc{font-size:11px;color:var(--muted2);line-height:1.4;position:relative;z-index:1}

/* ─── Divider ─── */
.nt-divider{
  width:500px;height:1px;
  background:linear-gradient(90deg,transparent,var(--border),transparent);
  animation:floatUp 0.55s 0.28s ease both;
}

/* ─── Sites ─── */
.nt-sites{
  display:flex;gap:10px;
  animation:floatUp 0.55s 0.28s ease both;
  max-width:500px;flex-wrap:wrap;justify-content:center;
}
.nt-site{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform 0.2s}
.nt-site:hover{transform:translateY(-3px)}
.nt-site-icon{
  width:46px;height:46px;background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;
  font-size:17px;color:var(--muted);transition:all 0.2s;
}
.nt-site:hover .nt-site-icon{border-color:var(--border-hi);color:var(--text);box-shadow:0 4px 18px rgba(0,0,0,0.45)}
.nt-site-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px}

@keyframes floatUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--muted2);border-radius:2px}
</style>
</head>
<body>

<div class="ambient">
  <div class="blob p"></div>
  <div class="blob c"></div>
  <div class="blob p2"></div>
</div>

<div class="newtab">
  <div class="nt-logo">
    <div class="nt-emblem">
      <img class="nt-emblem-img" src="../favicon.png" alt="Hyperspeed"/>
    </div>
    <div class="nt-wordmark"><span class="h">HYPER</span><span class="s">SPEED</span></div>
    <div class="nt-sub">private &nbsp;·&nbsp; fast &nbsp;·&nbsp; unrestricted</div>
  </div>

  <div class="nt-clock" id="nt-clock"></div>

  <div class="nt-search-wrap">
    <input class="nt-search" id="nt-search" placeholder="search or enter a url…" spellcheck="false" autocomplete="off"/>
    <div class="nt-search-icon"><i class="fa-solid fa-magnifying-glass"></i></div>
    <div class="nt-suggestions" id="nt-suggestions"></div>
  </div>

  <div class="nt-tiles">
    <div class="nt-tile pk" onclick="nav('hyperspeed://games')">
      <div class="tile-icon"><i class="fa-solid fa-gamepad"></i></div>
      <div class="tile-name">games</div>
      <div class="tile-desc">Play unblocked</div>
    </div>
    <div class="nt-tile cy" onclick="nav('hyperspeed://movies')">
      <div class="tile-icon"><i class="fa-solid fa-film"></i></div>
      <div class="tile-name">movies</div>
      <div class="tile-desc">Stream free</div>
    </div>
    <div class="nt-tile pk" onclick="nav('hyperspeed://ai')">
      <div class="tile-icon"><i class="fa-solid fa-robot"></i></div>
      <div class="tile-name">ai</div>
      <div class="tile-desc">Ask anything</div>
    </div>
    <div class="nt-tile cy" onclick="nav('hyperspeed://settings')">
      <div class="tile-icon"><i class="fa-solid fa-gear"></i></div>
      <div class="tile-name">settings</div>
      <div class="tile-desc">Configure</div>
    </div>
  </div>

  <div class="nt-divider"></div>

  <div class="nt-sites">
    <div class="nt-site" onclick="nav('https://wikipedia.org')">
      <div class="nt-site-icon"><i class="fa-brands fa-wikipedia-w"></i></div>
      <div class="nt-site-label">Wiki</div>
    </div>
    <div class="nt-site" onclick="nav('https://reddit.com')">
      <div class="nt-site-icon"><i class="fa-brands fa-reddit"></i></div>
      <div class="nt-site-label">Reddit</div>
    </div>
    <div class="nt-site" onclick="nav('https://x.com')">
      <div class="nt-site-icon"><i class="fa-brands fa-x-twitter"></i></div>
      <div class="nt-site-label">X</div>
    </div>
    <div class="nt-site" onclick="nav('https://github.com')">
      <div class="nt-site-icon"><i class="fa-brands fa-github"></i></div>
      <div class="nt-site-label">GitHub</div>
    </div>
    <div class="nt-site" onclick="nav('https://news.ycombinator.com')">
      <div class="nt-site-icon"><i class="fa-solid fa-newspaper"></i></div>
      <div class="nt-site-label">HN</div>
    </div>
    <div class="nt-site" onclick="nav('https://open.spotify.com')">
      <div class="nt-site-icon"><i class="fa-brands fa-spotify"></i></div>
      <div class="nt-site-label">Spotify</div>
    </div>
  </div>
</div>

<script>
// ── Clock ──────────────────────────────────────────────────────────────────
function tick() {
  const el = document.getElementById('nt-clock');
  if (!el) return;
  const now = new Date(), pad = n => String(n).padStart(2,'0');
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  el.textContent = `${days[now.getDay()]}  ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
}
tick();
setInterval(tick, 1000);

// ── Navigate ───────────────────────────────────────────────────────────────
function nav(url) {
  try { window.parent.tabNavigate(window.parent.activeTabId, url); }
  catch(e) { window.top.location.href = url; }
}

// ── Suggestions ────────────────────────────────────────────────────────────
const SUGGESTIONS = [
  { icon:'fa-solid fa-gamepad',   label:'hyperspeed://games',   hint:'Games library' },
  { icon:'fa-solid fa-film',      label:'hyperspeed://movies',  hint:'Stream movies' },
  { icon:'fa-solid fa-robot',     label:'hyperspeed://ai',      hint:'AI assistant' },
  { icon:'fa-solid fa-gear',      label:'hyperspeed://settings',hint:'Settings' },
  { icon:'fa-brands fa-google',   label:'google.com',           hint:'Google Search' },
  { icon:'fa-brands fa-youtube',  label:'youtube.com',          hint:'YouTube' },
  { icon:'fa-brands fa-github',   label:'github.com',           hint:'GitHub' },
  { icon:'fa-brands fa-reddit',   label:'reddit.com',           hint:'Reddit' },
  { icon:'fa-brands fa-wikipedia-w','label':'wikipedia.org',    hint:'Wikipedia' },
];

const search = document.getElementById('nt-search');
const sug = document.getElementById('nt-suggestions');

search.addEventListener('input', () => {
  const v = search.value.trim().toLowerCase();
  if (!v) { sug.classList.remove('open'); return; }
  const matches = SUGGESTIONS.filter(s => s.label.includes(v) || s.hint.toLowerCase().includes(v));
  if (!matches.length) { sug.classList.remove('open'); return; }
  sug.innerHTML = matches.map(s => `
    <div class="nt-sug-item" onclick="nav('${s.label}')">
      <i class="${s.icon}"></i>
      <span>${s.label}</span>
      <span class="nt-sug-hint">${s.hint}</span>
    </div>`).join('');
  sug.classList.add('open');
});

search.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const val = search.value.trim();
    if (val) { sug.classList.remove('open'); nav(val); }
  }
  if (e.key === 'Escape') sug.classList.remove('open');
});

search.addEventListener('blur', () => setTimeout(() => sug.classList.remove('open'), 150));
document.addEventListener('click', e => { if (!e.target.closest('.nt-search-wrap')) sug.classList.remove('open'); });
</script>
</body>
</html>
